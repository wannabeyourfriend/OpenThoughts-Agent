# TACC Vista per-model overrides — 65k context variant.
#
# Identical to tacc_baseline_model_configs.yaml but pins allenai/tmax-9b to
# max_model_len=65536 (vs the standard 32768). Use via:
#   --baseline-model-configs eval/clusters/tacc_baseline_model_configs_65k.yaml

models:
  "allenai/tmax-9b":
    tensor_parallel_size: 1
    max_model_len: 65536
    trust_remote_code: true
    extra_args: "--enable-prefix-caching"

  "Qwen/Qwen3-32B":
    tensor_parallel_size: 1
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    extra_args: "--enable-prefix-caching"

  "Qwen/Qwen3-8B":
    tensor_parallel_size: 1
    max_model_len: 32768
    trust_remote_code: true
    extra_args: "--enable-prefix-caching"

patterns:
  - match: "(?i)32[Bb]"
    trust_remote_code: true
    tensor_parallel_size: 1
    max_model_len: 32768
    swap_space: 32
    extra_args: "--enable-prefix-caching"

  - match: ".*"
    trust_remote_code: true
    tensor_parallel_size: 1
    max_model_len: 32768
    extra_args: "--enable-prefix-caching"
