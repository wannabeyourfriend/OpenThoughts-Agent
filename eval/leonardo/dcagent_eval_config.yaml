# Harbor eval configuration for Leonardo (A100-64GB, 4 GPUs/node)
# Daytona environment, terminus-2 agent, 32k context, 8x timeout

job_name: default-eval-job
jobs_dir: trace_jobs
n_attempts: 3
timeout_multiplier: 8.0
debug: false

orchestrator:
  type: local
  n_concurrent_trials: 16
  quiet: false
  plain_output: true
  adaptive_concurrency:
    enabled: false
    algorithm: gradient2
    min_limit:
    max_limit:
    metrics_endpoint:
    metrics_timeout_sec: 10.0
    poll_interval_sec: 120.0
    window_size: 5
    queue_p95_drop_threshold:
    algorithm_kwargs: {}
  retry:
    max_retries: 10
    include_exceptions:
    exclude_exceptions:
    - AgentTimeoutError
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
    - SandboxBuildFailedError
    - VerifierRuntimeError
    - SummarizationTimeoutError
    - ContextLengthExceededError
    wait_multiplier: 2.0
    min_wait_sec: 1.0
    max_wait_sec: 90.0
  kwargs: {}

environment:
  type: daytona
  force_build: true
  delete: true
  # NOTE: no override_cpus / override_memory_mb / override_storage_mb. Setting
  # them clobbers each task's per-task default sandbox dimensions (harbor
  # environments/base.py::_maybe_override_task_env_config overwrites
  # task_env_config.{cpus,memory_mb,storage_mb} when the override is non-None),
  # which is NOT what the tb2/v2/swebench listener presets intend — those presets
  # forward dcagent_eval_config_no_override.yaml precisely so harbor INHERITS the
  # environment-declared (per-task) sandbox sizes. A fixed 2 CPU / 4096 MB mem /
  # 4096 MB disk override here forced every tmax-9b/27b eval leg onto an undersized
  # uniform sandbox (the "2/4/4" override). Leave these unset → resources=None →
  # harbor/Daytona use the task's own declared sizes.
  kwargs: {}

verifier:
  override_timeout_sec:
  max_timeout_sec:
  disable: false

# NOTE: no `metrics:` block. The old `mean-drop-ei` / `accuracy-drop-ei` types are
# a deprecated penfever/temp-override-era artifact that NO Marin-branch harbor
# supports — their presence raises `JobConfig ValidationError: Input should be
# 'sum','min','max','mean' or 'uv-script'` and kills every trial before any
# rollout. The canonical hpc/harbor_yaml/eval/dcagent_eval_defaults.yaml omits the
# block entirely (harbor uses its default reward metric); mirror that here.

agents:
- name: terminus-2
  import_path:
  model_name: placeholder/override-at-runtime
  max_timeout_sec:
  kwargs:
    record_terminal_session: false
    enable_episode_logging: false
    enable_pane_logging: false
    collect_rollout_details: false
    collect_engine_metrics: false
    metrics_endpoint: https://replace-with-vllm-host/metrics
    metrics_timeout_sec: 10
    model_info:
      max_input_tokens: 32768
      max_output_tokens: 8192
      input_cost_per_token: 0
      output_cost_per_token: 0

    trajectory_config:
      raw_content: true
      linear_history: true
    enable_summarize: true
    proactive_summarization_threshold: 8192
    interleaved_thinking: false
    parser_name: json
    tmux_pane_width: 160
    tmux_pane_height: 40
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
datasets:
- path: /replace/with/tasks/path

tasks: []
