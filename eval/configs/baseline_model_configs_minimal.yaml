# # --- Per-model overrides (merged on top of group config) ---
models:
  # SA-SWE-32B: authors use custom SkyRL OHCodeActAgent (engine-direct, not
  # portable). Best knowable scaffold via OpenAI-compat: Pattern B (hermes +
  # qwen3 reasoning) + swe-agent regular = 24.7% (paper 39.4%). Custom acc-
  # thinking template REGRESSED to 14.3% by filling 32K context with stale
  # <think> blocks → stuck-loop failures. See PREFERRED_HARNESS_REPRODUCTION.md §3.
  "NovaSky-AI/SA-SWE-32B":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    tool_call_parser: hermes
    reasoning_parser: qwen3
    extra_args: "--enable-prefix-caching"

  # OpenSWE-32B (GAIR daVinci-Env paper, arxiv 2603.13023): vanilla Qwen2.5
  # Hermes-style chat template — emits <tool_call>{"name":...}</tool_call> JSON
  # (NOT XML <function=bash>; earlier subagent claim was wrong). Stock swe-agent
  # default scaffold, parse_function: function_calling. Authors' sampling:
  # temp 0.7 / top_p 0.8 / top_k 20 / rep_penalty 1.2 (paper §4.1). Paper 62.4%
  # at 128k context; we cap at 32k.
  "GAIR/OpenSWE-32B":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    tool_call_parser: hermes
    extra_args: '--enable-prefix-caching --override-generation-config {"temperature":0.7,"top_p":0.8,"top_k":20,"repetition_penalty":1.2}'

  "GAIR/daVinci-Dev-32B":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    tool_call_parser: hermes
    extra_args: "--enable-prefix-caching"

  # Skywork-SWE-32B (Qwen2.5-Coder-32B finetune): plain vLLM serve, no parsers,
  # no chat template. Authors use OpenHands 0.32.0 CodeActAgent with mock_
  # function_calling (XML prompt parsed client-side). Paper 38.0% pass@1.
  # See PREFERRED_HARNESS_REPRODUCTION.md.
  "Skywork/Skywork-SWE-32B":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    extra_args: "--enable-prefix-caching"

  # R2EGym-32B-Agent (Qwen2.5-Coder-32B finetune): plain vLLM serve, no parsers.
  # Authors use custom R2E-Gym harness with XML <function=NAME><parameter=KEY>VAL
  # </parameter></function> format which matches OpenHands text-tools (mock_
  # function_calling). Native ctx 32k matches our cap. Paper 34.4% pass@1.
  # See PREFERRED_HARNESS_REPRODUCTION.md.
  "R2E-Gym/R2EGym-32B-Agent":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    extra_args: "--enable-prefix-caching"

  # Mistral Devstral-Small-2507 (24B SWE model) — requires mistral-format
  # tokenizer/config/weights and TP=2 per official Mistral recommendation.
  "mistralai/Devstral-Small-2507":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    tool_call_parser: mistral
    extra_args: "--tokenizer-mode mistral --config-format mistral --load-format mistral --enable-prefix-caching"

  # Mistral Devstral-Small-2-24B-Instruct-2512 (v2, 24B) — standard HF loading
  # (no mistral-format flags). Needs mistral_common >= 1.8.6 in the conda env.
  # Native context 262144; capped at 32768 for eval parity.
  "mistralai/Devstral-Small-2-24B-Instruct-2512":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    tool_call_parser: mistral
    extra_args: "--enable-prefix-caching"

  # Qwen3-32B — openhands native tool calling config.
  # hermes parser for tool calls, qwen3 reasoning parser to strip <think> blocks.
  "Qwen/Qwen3-32B":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    tool_call_parser: hermes
    reasoning_parser: qwen3
    extra_args: "--enable-prefix-caching"

  # Qwen3-Coder-30B-A3B-Instruct (30B MoE, 3B active) — designed for tool calling.
  # Model card recommends qwen3_coder parser for native tool calling, newer vLLM
  # (otagent2-fix, 0.17+) for MoE stability, and specific sampling params:
  # temperature=0.7, top_p=0.8, top_k=20, repetition_penalty=1.05.
  # Using --override-generation-config to apply server-side (applies to all
  # requests regardless of client-side settings).
  "Qwen/Qwen3-Coder-30B-A3B-Instruct":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    tool_call_parser: qwen3_coder
    extra_args: '--enable-prefix-caching --override-generation-config {"temperature":0.7,"top_p":0.8,"top_k":20,"repetition_penalty":1.05}'

  # NVIDIA Nemotron-3-Nano-30B-A3B-BF16 — 30B MoE, 3B active. Mirrors the legacy
  # TACC sbatch `openhands_nvidia_eval_harbor.sbatch` (native tool calling
  # with qwen3_coder parser + custom nano_v3 reasoning parser plugin +
  # model-specific chat template). otagent2-fix required for MoE on vLLM 0.17+.
  # Max context capped at 32768 for eval parity with other models.
  # --enforce-eager matches legacy. Sampling temp=0.6, top_p=0.95.
  "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16":
    conda_env: otagent2-fix
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    tool_call_parser: qwen3_coder
    reasoning_parser: nano_v3
    extra_args: '--reasoning-parser-plugin ${DCFT}/eval/configs/nano_v3_reasoning_parser.py --chat-template ${DCFT}/eval/configs/nemotron_chat_template.jinja --enable-prefix-caching --override-generation-config {"temperature":0.6,"top_p":0.95}'

  # Qwen3-30B-A3B-Instruct-2507 (30B MoE, 3B active) — Pattern D for terminus-2.
  # otagent2-fix required for MoE stability on vLLM 0.17+.
  "Qwen/Qwen3-30B-A3B-Instruct-2507":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    extra_args: "--enable-prefix-caching"

  # Allen AI SERA-32B (SWE-bench model) — Pattern A. Paper-parity vLLM flags
  # (enforce-eager, disable-cascade-attn, seed 42); no prefix-caching or
  # reasoning_parser. TP=2 (not paper's TP=4) to fit a single-node serving slot.
  "allenai/SERA-32B":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    tool_call_parser: hermes
    extra_args: "--enforce-eager --disable-cascade-attn --seed 42"

  # Allen AI SERA-8B — mirror SERA-32B paper-parity flags, scaled for 8B.
  "allenai/SERA-8B":
    tensor_parallel_size: 1
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    tool_call_parser: hermes
    extra_args: "--enforce-eager --disable-cascade-attn --seed 42"

  # Allen AI tmax-9b / tmax-27b — model_type: qwen3_5 (Qwen3_5ForConditionalGeneration,
  # dense, NOT MoE; verified 2026-06-23 for BOTH sizes). The default otagent vLLM
  # 0.16.0 has NO qwen3_5 impl and transformers 4.x can't parse the config, so these
  # MUST serve from the eval-qwen35 env (fork-vLLM @ 76259c63a + transformers 5.12.1;
  # ENVIRONMENT_MAP §2f). conda_env triggers the Leonardo sbatch to activate eval-qwen35
  # + export the §2f load-bearing serve env (VLLM_USE_FLASHINFER_SAMPLER=0,
  # VLLM_ATTENTION_BACKEND=FLASH_ATTN, LIBRARY_PATH stubs, conda libstdc++ on LD path).
  # tmax is a VL arch shipping no preprocessor_config.json → serve text-only via
  # --limit-mm-per-prompt image=0,video=0. TP=4 serve-smoke-verified for 9b (job 47715931);
  # 27b is dense ~54GB bf16 → fits 4xA100-64GB at TP=4. Context 32k.
  "allenai/tmax-9b":
    conda_env: eval-qwen35
    tensor_parallel_size: 4
    max_model_len: 32768
    swap_space: 32
    # JSON object string — fork-vLLM json.loads() this. Routed via its own field
    # (NOT extra_args) so the quotes survive shell word-splitting.
    limit_mm_per_prompt: '{"image":0,"video":0}'

  # 27b ID-eval reconfigured TP=4 -> DATA-PARALLEL on the single 4-GPU A100-64GB
  # node (2026-06-24): 2 replicas x 2-way TP = 4 GPUs. TP=4 made each of 32-128
  # concurrent decode streams crawl (~10 tok/s) → a 16k-token thinking gen needed
  # ~1,550s >> the 600s litellm timeout → ~2,900 timeouts + a summarization spiral
  # (serve was NOT overloaded: KV 29-47%, empty queue, no preemption). DP2xTP2
  # splits weights 2-way (~27GB/card → ~37GB free for KV at 32k) and ~2x's the
  # per-stream speed. Pair with EVAL_N_CONCURRENT=16 (~16 concurrent keeps each
  # stream fast). Do NOT use DP4/TP1 at 32k — 54GB weights on 64GB leaves only
  # ~7-10GB KV (~27k tokens), KV-starved (fallback only if max_model_len drops).
  "allenai/tmax-27b":
    conda_env: eval-qwen35
    tensor_parallel_size: 2
    data_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    limit_mm_per_prompt: '{"image":0,"video":0}'

  # Qwen3.6-35B-A3B / Qwen3.5-35B-A3B — model_type: qwen3_5_moe
  # (Qwen3_5MoeForConditionalGeneration). Verified from HF config.json (2026-06-25,
  # both repos public + ungated): hybrid linear/full-attn MoE, text_config has
  # 40 layers, hidden 2048, 16 attn / 2 KV heads (GQA group 8), head_dim 256,
  # 256 experts top-8, native ctx 262144, vocab 248320, bf16. ~34.4B total /
  # ~3.2B active. Both sizes are arch-identical for serving → same preset.
  #
  # conda_env: eval-qwen35 — MANDATORY. This is the ONLY env that can vLLM-serve
  # model_type: qwen3_5 / qwen3_5_moe (fork-vLLM 0.20.x @ 76259c63a registers
  # Qwen3_5MoeForConditionalGeneration + transformers 5.12.1 parses the hybrid
  # GatedDeltaNet config; ENVIRONMENT_MAP §2f). The generic `(?i)qwen3\.5` pattern
  # below routes to otagent2-fix (vLLM 0.17.1, NO qwen3_5 impl) — WRONG for these,
  # so these EXACT-match entries override the pattern (cf. the 131k-fixthink note).
  # The §2f load-bearing serve env (VLLM_USE_FLASHINFER_SAMPLER=0,
  # VLLM_ATTENTION_BACKEND=FLASH_ATTN, conda libstdc++ on LD path, libcuda stub)
  # is exported by the Leonardo sbatch when conda_env=eval-qwen35.
  #
  # TP=2 + DP=2 (2026-06-25): mirrors the PROVEN allenai/tmax-27b DP=2/TP=2 eval
  # geometry on the same Leonardo 4×A100-64GB node (jobs 47773531/654/810 — DP=2/TP=2
  # gave AgentTimeout=0 vs higher-TP problems). These are A3B MoE (~34.4B total /
  # ~3.2B ACTIVE) — TP only needs to be big enough to FIT the weights; TP=4 just
  # adds wasteful comms overhead on the tiny active-param compute. Geometry: weights
  # ~69 GB bf16 → TP=2 ≈ 34.5 GB/GPU, fits 64 GB with KV headroom at 32k (the hybrid
  # arch grows KV on only 10/40 layers so 32k is cheap). TP=2 divides 16 attn heads
  # (8/GPU); 2 KV heads / TP=2 = 1 KV head/GPU (legal GQA, no replication); 256
  # experts / TP=2 = 128/GPU. DP=2 runs 2 native vLLM replicas → 2× throughput.
  # Total GPUs = TP×DP = 4 = one full Leonardo node (sbatch derives gres from TP×DP).
  # data_parallel_size is read by the listener → EVAL_VLLM_DATA_PARALLEL_SIZE →
  # vLLM --data-parallel-size, exactly like the tmax-27b entry above.
  # max_model_len 32768: eval parity with every neighbor (native ctx is 262144
  # but eval contexts cap at 32k; no YaRN/rope_scaling needed — 32768 << 262144).
  # NO tool_call_parser / reasoning_parser: Pattern D for terminus-2 (it parses
  # JSON client-side; parsers hijack that, like the Qwen3-30B-A3B-2507 neighbor).
  # VL arch (carries vision_config) → serve TEXT-only via limit_mm_per_prompt
  # image=0,video=0 (these DO ship preprocessor_config.json, but text-only avoids
  # the multimodal path entirely; mirrors the tmax qwen3_5 entries).
  "Qwen/Qwen3.6-35B-A3B":
    conda_env: eval-qwen35
    tensor_parallel_size: 2
    data_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    limit_mm_per_prompt: '{"image":0,"video":0}'
    extra_args: "--enable-prefix-caching"

  "Qwen/Qwen3.5-35B-A3B":
    conda_env: eval-qwen35
    tensor_parallel_size: 2
    data_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    limit_mm_per_prompt: '{"image":0,"video":0}'
    extra_args: "--enable-prefix-caching"

  # ethanlshen Qwen3-32B SERA reproductions — Pattern A paper-parity flags
