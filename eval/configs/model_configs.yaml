  # TACC Vista (hardware_profile: gh200 / gh200-65k) — STANDALONE @profile entries.
  # Vista has ONE 96GB GH200/node, AND runs a different vLLM env + terminus-2
  # Pattern-D scaffold than Leonardo/Jupiter, so these models diverge on INTRINSIC
  # fields (no tool_call_parser/reasoning_parser; no eval-qwen35 conda_env — the
  # otagent fork-vLLM resolves qwen3_5_moe natively; no DP). A variant can ADD/replace
  # but not REMOVE a base key, so these are flat name@<profile> standalone entries
  # (no inheritance) carrying the FULL Vista recipe VERBATIM from the retired forks
  # eval/clusters/tacc_baseline_model_configs*.yaml. (Migration: model-config decoupling Stage 3.)
  # --- @gh200 (32k) ---
  "Qwen/Qwen3-32B@gh200":
    tensor_parallel_size: 1
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    extra_args: --enable-prefix-caching

  "Qwen/Qwen3-8B@gh200":
