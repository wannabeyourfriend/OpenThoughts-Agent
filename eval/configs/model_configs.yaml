  # Max context capped at 32768 for eval parity with other models.
  # --enforce-eager matches legacy. Sampling temp=0.6, top_p=0.95.
  "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16":
    conda_env: otagent2-fix
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    tool_call_parser: qwen3_coder
    reasoning_parser: nano_v3
    # Nemotron-Nano v3 is a reasoning model, thinking ON. The HF model card's vLLM
    # snippet uses the SAME chat_template_kwargs.enable_thinking key
    # (`chat_template_kwargs={"enable_thinking": ...}`), so we deliver it that way.
    # ⚠ VERIFY-ON-FIRST-RUN: a secondary source suggests the v3 toggle may instead
    # be a system-prompt `/think` `/no_think` directive (not a kwarg). The model
    # card form is taken as authoritative; if the kwarg is silently ignored at
    # serve time, switch to the system-prompt directive. (It also supports a
    # `reasoning_budget` to cap thinking length — left unset = model default.)
    agent_kwargs:
      - 'extra_body={"chat_template_kwargs":{"enable_thinking":true}}'
    extra_args: '--reasoning-parser-plugin ${DCFT}/eval/configs/nano_v3_reasoning_parser.py --chat-template ${DCFT}/eval/configs/nemotron_chat_template.jinja --enable-prefix-caching --override-generation-config {"temperature":0.6,"top_p":0.95}'

