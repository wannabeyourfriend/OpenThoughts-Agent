# Pattern fallbacks. Each carries an explicit `profiles:` filter (a pattern with NO `profiles`
# would apply to ALL clusters). The DEFAULT set below (migrated from minimal.yaml, profiles:
# [default]) is the Leonardo/Jupiter multi-GPU node-fill geometry (32B -> TP=4 etc.); the Vista
# set further down (profiles: [gh200, gh200-65k]) is the single-GH200 TP=1 geometry. Scoping
# keeps each cluster's HW-specific pattern fallbacks from leaking onto the others.
patterns:
  - match: "(?i)qwen3\\.5"
    profiles: [default]
    conda_env: otagent2-fix
    trust_remote_code: true
    max_model_len: 32768
    swap_space: 32
    extra_args: "--enable-prefix-caching"

  - match: "(?i)(?:32b.*(131k|-lc)|(131k|-lc).*32b)"
    profiles: [default]
    trust_remote_code: true
    tensor_parallel_size: 2
    max_model_len: 131072
    swap_space: 32
    hf_overrides: '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768}}'
    extra_args: "--enable-prefix-caching"

  # 32B serve geometry = TP=4 / DP=1 (was TP=2, which on a 4-GPU node the listener
  # node-fills to TP=2/DP=2 → vLLM --data-parallel-size 2). The DP=2 path crashes
  # deterministically at vLLM engine-core init on Leonardo's otagent vLLM build
  # (DPLBAsyncMPClient → wait_for_engine_startup → "Engine core initialization
  # failed. Failed core proc(s): {}"; confirmed jobs 48009185 / 48020392, and the
  # earlier nemotron leg). It is NOT model-artifact-specific — it hits ANY 32B
  # served at TP=2/DP=2 here. TP=4 fits a 32B on Leonardo's 4×A100-64GB node
  # (~65GB bf16 / 4 = ~16GB/GPU, ample KV headroom at 32k; Qwen3-32B's 64 attn /
  # 8 KV heads divide cleanly by 4) and, being the whole node, the listener sets
  # dp = gpus_per_node // tp = 4 // 4 = 1 → NO --data-parallel-size, avoiding the
  # broken DPLBAsyncMPClient path entirely. This unblocks the gptlong/tezos/fresh/
  # gptlong_continue/nemotron Tier-1 32B family (all pattern-matched, no exact entry).
  #
  # --enforce-eager (added 2026-06-28): with TP=4 + gpu_mem_util 0.9 on the 64GB
  # A100 node, vLLM's FULL_AND_PIECEWISE CUDA-graph capture (51 piecewise + 35 full
  # graphs) OOMs at the tail of capture — engine-core init + weight load + KV alloc
  # (39.8 GiB, 19.9x concurrency @ 32k) all SUCCEED, then `torch.AcceleratorError:
  # CUDA error: out of memory` in capture_model() kills a worker (jobs 48022043/etc,
  # all 16 relaunched legs, identical). enforce-eager skips graph capture entirely,
  # eliminating the capture-time OOM (mirrors the SERA-32B paper-parity entries,
  # which already serve eager). Decode is slightly slower but the 32B 16x timeout
  # multiplier absorbs it; correctness > a few % serve throughput.
  - match: "(?i)32[Bb]"
    profiles: [default]
    trust_remote_code: true
    tensor_parallel_size: 4
    max_model_len: 32768
    swap_space: 32
    extra_args: "--enable-prefix-caching --enforce-eager"

  - match: "131k|-lc$"
    profiles: [default]
    trust_remote_code: true
    max_model_len: 131072
    swap_space: 32
    hf_overrides: '{"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768}}'
    extra_args: "--enable-prefix-caching"

  # --- TACC Vista pattern fallbacks (hardware_profile gh200 / gh200-65k ONLY) ---
  # Force TP=1 (single GH200/node; size-default would pick TP=2 for >14B) + prefix-cache.
  # Profile-scoped so they do NOT leak onto Leonardo/Jupiter (which use the patterns above).
  - match: "(?i)32[Bb]"
    profiles: [gh200, gh200-65k]
    trust_remote_code: true
    tensor_parallel_size: 1
    max_model_len: 32768
    swap_space: 32
    extra_args: --enable-prefix-caching
  - match: ".*"
    profiles: [gh200, gh200-65k]
    trust_remote_code: true
    tensor_parallel_size: 1
    max_model_len: 32768
    extra_args: --enable-prefix-caching
