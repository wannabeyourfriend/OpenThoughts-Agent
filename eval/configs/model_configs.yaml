# Shared model-config registry — the SINGLE source of truth for model-INTRINSIC
# vLLM serving config, keyed by HF model name and shared across ALL clusters.
#
# This is the decoupled replacement for the per-cluster baseline-model-config forks
# (eval/configs/baseline_model_configs_minimal.yaml + eval/clusters/tacc_baseline_model_configs*.yaml).
# Loaded by eval/unified_eval_listener.py::load_model_registry when a launch opts in via
# --use-model-registry (or cluster `use_model_registry: true`). The legacy
# --baseline-model-configs path stays the default until the Stage-4 cutover.
#
# Stage 2: `models:`/`patterns:` below are migrated VERBATIM from
# baseline_model_configs_minimal.yaml (the shared multi-GPU base = Leonardo/Jupiter values).
# Stage 3 folds the TACC (1x GH200/node) forks in as `variants: {gh200: {...}}` overrides.
#
# FORMAT
#   models:    Per-model entries (exact HF name -> config). Hold the MODEL-INTRINSIC serve
#              keys PLUS an optional `variants:` block keyed by HARDWARE-PROFILE name.
#   groups:    Apply one config to many models. Per-model entries merge on top (override wins).
#   patterns:  Regex fallback when no exact/group match. First match wins (order preserved).
#
# VARIANTS: a cluster declaring `hardware_profile: <name>` shallow-merges the matching
#   `variants[<name>]` over the base entry (variant replaces each named top-level key; no deep
#   merge). No matching variant -> base entry unchanged. Precedence:
#       exact+variant[profile] > exact > group > pattern -> size-default
#   (a strict superset of today's exact/group/pattern chain).
#
# DEFAULT-ON (Stage-4 cutover): this registry is now the DEFAULT resolution path for ALL
#   clusters. The legacy --baseline-model-configs flag still works as an explicit per-launch
#   override but is DEPRECATED (emits a DeprecationWarning); migrate any model into this file
#   instead (a `name@<profile>` standalone for an intrinsic divergence, or a `variants:` block
#   for a pure hardware delta + the cluster's `hardware_profile`).
#
# max_output_tokens (OPTIONAL, model-intrinsic): the per-model serve-OUTPUT-token budget. When
#   set on a model entry (or a variant), the listener forwards it as EVAL_MAX_OUTPUT_TOKENS,
#   exactly mirroring how `max_model_len` -> EVAL_VLLM_MAX_MODEL_LEN. ABSENT (the default for
#   EVERY model here) -> the env var is NOT set, so the sbatch :-16384 default applies unchanged.
#   This is the single home to PIN a model's generation budget (e.g. a thinking model that needs
#   a larger-than-16384 budget); pinning a specific model is a parity-changing follow-up, NOT a
#   no-op — do it deliberately. Example:
#       "org/some-thinking-model":
#         max_model_len: 65536
#         max_output_tokens: 32768   # -> EVAL_MAX_OUTPUT_TOKENS=32768 (overrides the 16384 default)

models:
  # SA-SWE-32B: authors use custom SkyRL OHCodeActAgent (engine-direct, not
  # portable). Best knowable scaffold via OpenAI-compat: Pattern B (hermes +
  # qwen3 reasoning) + swe-agent regular = 24.7% (paper 39.4%). Custom acc-
  # thinking template REGRESSED to 14.3% by filling 32K context with stale
  # <think> blocks → stuck-loop failures. See PREFERRED_HARNESS_REPRODUCTION.md §3.
  "NovaSky-AI/SA-SWE-32B":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    tool_call_parser: hermes
    reasoning_parser: qwen3
    # Qwen3-32B base → hybrid thinking via enable_thinking. Runs thinking-ON
    # (Pattern B: reasoning_parser qwen3 strips <think>). The PREFERRED_HARNESS
    # regression was a CUSTOM acc-thinking TEMPLATE, not enable_thinking itself.
    agent_kwargs:
      - 'extra_body={"chat_template_kwargs":{"enable_thinking":true}}'
    extra_args: "--enable-prefix-caching"

  # OpenSWE-32B (GAIR daVinci-Env paper, arxiv 2603.13023): vanilla Qwen2.5
  # Hermes-style chat template — emits <tool_call>{"name":...}</tool_call> JSON
  # (NOT XML <function=bash>; earlier subagent claim was wrong). Stock swe-agent
  # default scaffold, parse_function: function_calling. Authors' sampling:
  # temp 0.7 / top_p 0.8 / top_k 20 / rep_penalty 1.2 (paper §4.1). Paper 62.4%
  # at 128k context; we cap at 32k.
  "GAIR/OpenSWE-32B":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    tool_call_parser: hermes
    extra_args: '--enable-prefix-caching --override-generation-config {"temperature":0.7,"top_p":0.8,"top_k":20,"repetition_penalty":1.2}'

  "GAIR/daVinci-Dev-32B":
    tensor_parallel_size: 2
    max_model_len: 32768
    swap_space: 32
    trust_remote_code: true
    tool_call_parser: hermes
    extra_args: "--enable-prefix-caching"

