# Harbor eval config — aider agent, no thinking, diff format
n_attempts: 3
timeout_multiplier: 1.0
orchestrator:
  type: local
  n_concurrent_trials: 16
  quiet: false
  plain_output: true
  retry:
    max_retries: 10
    exclude_exceptions:
      - AgentTimeoutError
      - AgentEnvironmentTimeoutError
      - BadRequestError
      - VerifierTimeoutError
      - SummarizationTimeout
      - SummarizationTimeoutError
      - ContextLengthExceededError
    wait_multiplier: 1.0
    min_wait_sec: 1.0
    max_wait_sec: 60.0
environment:
  type: daytona
  force_build: false
verifier:
  max_timeout_sec: 14400
agents:
  - name: aider
    max_timeout_sec: 7200
    kwargs:
      edit_format: diff
      auto_lint: true
      auto_test: true
      test_cmd: "bash tests/test.sh"
      stream: false
      thinking_tokens: 0
datasets:
  - path: examples/tasks
