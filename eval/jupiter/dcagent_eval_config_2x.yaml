# Clone of dcagent_eval_config.yaml (canonical terminus-2 eval config) with the
# top-level timeout_multiplier raised to 2.0, for the 1x-vs-2x AgentTimeout A/B.
# The listener (unified_eval_listener.py L997-998) reads this top-level value and
# injects it as the EXPLICIT global EVAL_TIMEOUT_MULTIPLIER override for ALL models,
# bypassing the size-based default path (race-safe vs the size->multiplier plumbing
# edits). No stale *-drop-ei metrics, so no JobConfig ValidationError.
jobs_dir: /e/data1/datasets/playground/mmlaion/shared/guha1/eval_jobs
n_attempts: 3
timeout_multiplier: 2.0
orchestrator:
  type: local
  n_concurrent_trials: 16
  quiet: false
  retry:
    max_retries: 3
    exclude_exceptions:
      - AgentTimeoutError
      - EnvironmentStartTimeoutError
      - SandboxBuildFailedError
      - VerifierTimeoutError
    wait_multiplier: 1.0
    min_wait_sec: 1.0
    max_wait_sec: 60.0
environment:
  type: daytona
  force_build: false
  delete: false
  kwargs:
    auto_snapshot: true
agents:
  - name: terminus-2
    trajectory_config:
      raw_content: true
      linear_history: true
datasets:
  - path: examples/tasks
