# E3 (v6e-16 TP=8 DP=2): D3 stack seqs=4 → engine cap=8 (KV stress)
# v6e-16 with TP=8 × DP=2 (two engine replicas, each spanning 8 of 16 chips).
# TP=16 failed loading gemma4's `embed_vision.embedding_projection` weight
# (shape 1152x5376) — 1152 doesn't shard cleanly at TP=16 (1152/16=72,
# prime factor 9 doesn't tile). TP=8 splits to 144 cleanly. So DP=2 is the
# only way to fully use all 16 chips.
#
# Engine capacity = max_num_seqs × DP = seqs×2.
env_vars:
  MODEL_IMPL_TYPE: auto
engine:
  type: vllm_local
  model: google/gemma-4-31B-it
  max_output_tokens: 4096
  healthcheck_interval: 1800
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: google/gemma-4-31B-it
  num_replicas: 1
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  data_parallel_size: 2
  time_limit: '48:00:00'
  max_model_len: 131072
  max_num_seqs: 4
  gpu_memory_utilization: 0.85
  enable_expert_parallel: false
  enable_auto_tool_choice: true
  tool_call_parser: hermes
  reasoning_parser: gemma4
  trust_remote_code: false
  extra_args:
  - --dtype
  - bfloat16
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  - --max-num-batched-tokens
  - '131072'
  - --kv-cache-dtype
  - fp8
