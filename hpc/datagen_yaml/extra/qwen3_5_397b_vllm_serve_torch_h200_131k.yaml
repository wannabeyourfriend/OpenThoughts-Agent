# Qwen3.5-397B-A17B-AWQ - MoE reasoning model, AWQ 4-bit quantized
# https://huggingface.co/QuantTrio/Qwen3.5-397B-A17B-AWQ
#
# 131K context variant
#
# Hardware: 8x H200 141GB (~1.1TB total)
#   - Model weights ~200GB (AWQ 4-bit) → much more room for KV cache
#   - fp8 KV cache for memory efficiency at long contexts
#
engine:
  type: vllm_local
  model: QuantTrio/Qwen3.5-397B-A17B-AWQ
  max_output_tokens: 16384
  healthcheck_interval: 300
  request_params:
    temperature: 1.0
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: QuantTrio/Qwen3.5-397B-A17B-AWQ
  num_replicas: 1
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '48:00:00'
  max_model_len: 131072
  max_num_seqs: 16
  gpu_memory_utilization: 0.9
  swap_space: 32
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  trust_remote_code: true
  extra_args:
  - --language-model-only
  - --quantization
  - awq
  - --dtype
  - auto
  - --kv-cache-dtype
  - fp8
  - --block-size
  - '16'
  - --enable-chunked-prefill
  - --max-num-partial-prefills
  - '1'
  - --enable-prefix-caching
  - --max-num-batched-tokens
  - '16384'
  - --all2all-backend
  - pplx
