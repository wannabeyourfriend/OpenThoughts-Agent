# Qwen3.5-397B-A17B-FP8 — MoE reasoning model, FP8 weight quantization
# https://huggingface.co/Qwen/Qwen3.5-397B-A17B-FP8
#
# 32K context variant, Jupiter GH200 multi-node — TP=8 / 2-node variant.
#
# Hardware: 2 nodes × 4x GH200 96GB = 8 GPUs (~768GB VRAM total)
#   - FP8 weights ~397GB (1 byte / param × 397B params) → TP=8 cross-2-node
#     → ~50GB/GPU (similar to GLM-5.1-AWQ 2-node layout)
#   - 96GB - 50GB ≈ 46GB per GPU for KV cache + activations
#     (KV cache with fp8 + max_num_seqs=32 ≈ 30GB, comfortable headroom)
#   - DP=1 single replica spanning 2 nodes via NCCL TP over 1 IB hop pair
#   - The new vLLM wheel's V1 engine has a multi-node DP regression
#     (vllm/v1/engine/utils.py:get_device_indices IndexError), so we
#     stay on DP=1 cross-node TP rather than 2× DP=1 single-node TP=4.
#
# Designed as a fallback to GLM-5.1-AWQ. Qwen3.5-397B has the same
# topology (TP=8 across 2 IB-paired nodes) as GLM-5.1, so it tests
# whether the residual Bug C sample_tokens stall is GLM-specific (it's
# a different model family, different MoE expert dispatch, different
# Triton kernel set) or whether it's truly a vLLM cross-node-TP issue
# that would hit any 2-node TP=8 deployment.

engine:
  type: vllm_local
  model: Qwen/Qwen3.5-397B-A17B-FP8
  max_output_tokens: 16384
  healthcheck_interval: 300
  request_params:
    temperature: 1.0
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: Qwen/Qwen3.5-397B-A17B-FP8
  num_replicas: 1
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '11:59:00'
  max_model_len: 32768
  max_num_seqs: 32
  gpu_memory_utilization: 0.9
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  trust_remote_code: true
  # Disable DEEP_GEMM and the FlashInfer sampler — the sampler owns the
  # _topk_topp_kernel JIT path that historically deadlocked cross-rank
  # coordination on GLM-5.1-AWQ. Keep FLASHINFER_MOE_FP16 ON.
  use_deep_gemm: false
  use_flashinfer_sampler: false
  use_flashinfer_moe_fp16: true
  extra_args:
  - --dtype
  - bfloat16
  # FP8 weights are loaded natively; KV cache also kept in fp8 for memory.
  - --kv-cache-dtype
  - fp8
  # Disables CUDA graphs + Inductor; Triton kernels still JIT but in eager
  # dispatch, avoiding the cross-rank deadlock. Matched to the GLM-5.1
  # 2-node recipe.
  - --enforce-eager
  # Prefill / caching are default-OFF via hpc/vllm_utils.py's
  # `_DEFAULT_OFF_BOOLEAN_FLAGS` — the launcher injects --no-enable-... .
  # With chunked prefill OFF, vLLM requires
  # max_num_batched_tokens >= max_model_len, so set to 32768 to match
  # max_model_len. To re-enable chunked prefill / prefix caching for this
  # YAML, add the `--enable-...` flag back here or set
  # `enable_chunked_prefill: true` / `enable_prefix_caching: true` at the
  # top level.
  - --max-num-batched-tokens
  - '32768'
