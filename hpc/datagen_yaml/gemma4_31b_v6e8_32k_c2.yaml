# C2: seqs=16, n_conc=128 — 2× concurrency vs A3
# Concurrency-push grid starts from A3 (TP=8 seqs=8) which gave 129.9 tok/s
# on gemma4-31b-a3-hf-173500. Each C-config bumps max_num_seqs in vLLM and
# the launcher's --n_concurrent in lockstep until vLLM scheduler saturates.
# Part of grid in /Users/benjaminfeuer/Documents/notes/marin/experiments/gemma4_31b_v6e8_32k_grid.md
env_vars:
  MODEL_IMPL_TYPE: auto
engine:
  type: vllm_local
  model: google/gemma-4-31B-it
  max_output_tokens: 4096
  healthcheck_interval: 900
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: google/gemma-4-31B-it
  num_replicas: 1
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '48:00:00'
  max_model_len: 32768
  max_num_seqs: 16
  gpu_memory_utilization: 0.85
  enable_expert_parallel: false
  enable_auto_tool_choice: true
  tool_call_parser: hermes
  reasoning_parser: gemma4
  trust_remote_code: false
  extra_args:
  - --dtype
  - bfloat16
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  - --max-num-batched-tokens
  - '32768'
