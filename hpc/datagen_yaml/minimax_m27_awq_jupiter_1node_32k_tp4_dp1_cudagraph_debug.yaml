# MiniMax-M2.7-AWQ-4bit — DP=1 CUDAGRAPH DEBUG variant (2026-05-27)
# https://huggingface.co/cyankiwi/MiniMax-M2.7-AWQ-4bit
#
# PURPOSE: reproduce + characterize MiniMax's cudagraph JIT-recompile-mid-
# inference issue that forced enforce_eager. DP=1 isolates it from the
# cross-DP agrs/reduce_scatterv hang entirely (no cross-node DP collective),
# so any crash here is the cudagraph/torch.compile path, not DP coordination.
#
# KEY DIFFERENCE vs the dp2/dp4 configs: NO --enforce-eager → cudagraphs ON.
# Expect either (a) the capture-time "illegal memory access in
# profile_cudagraph_memory" crash, or (b) the user-reported JIT recompilation
# firing mid-inference and killing the job. Either reproduces track B.
#
# Hardware: 1 node × 4× GH200 96GB = 4 GPUs (TP=4, EP=4 within the node).
#   AWQ 4-bit ~115 GB / 4 = ~29 GB/GPU weights; ample headroom for KV/graphs.
#
# Required launch flags: --num_nodes 1 --gpus_per_node 4

engine:
  type: vllm_local
  model: cyankiwi/MiniMax-M2.7-AWQ-4bit
  max_output_tokens: 8192
  healthcheck_interval: 300
  request_params:
    temperature: 0.7
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: cyankiwi/MiniMax-M2.7-AWQ-4bit
  num_replicas: 1
  tensor_parallel_size: 4
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '11:59:00'
  max_model_len: 32768
  max_num_seqs: 32
  gpu_memory_utilization: 0.9
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: minimax_m2
  reasoning_parser: minimax_m2
  trust_remote_code: true
  use_deep_gemm: false
  use_flashinfer_sampler: false
  use_flashinfer_moe_fp16: true
  # diagnostics retained from the dp2 config
  pynccl_trace_flush_interval_sec: 300
  pynccl_pyspy_on_sigusr1: true
  pynccl_faulthandler_interval_sec: 0
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  # NO --enforce-eager here ON PURPOSE — cudagraphs ENABLED to reproduce the
  # JIT-recompile-mid-inference / capture crash (track B debug).
  - --chat-template-content-format
  - string
  - --max-num-batched-tokens
  - '32768'
  - --all2all-backend
  - allgather_reducescatter
  # DP=1 → no --data-parallel-backend / --data-parallel-size-local needed.
