# Qwen3.5-122B-A10B-FP8 — v5p-16 S2: TP=8 DP=1 seqs=64 + FP8 KV stack (fit ablation).
#
# Tests whether the 32k winner config (seqs=64 + FP8 KV + chunked-prefill +
# prefix-cache) fits on a 2-host v5p-16 slice (8 chips, 760 GiB HBM
# total). TP=8 matches the FP8 weight_block_size [128,128] ceiling. DP=1
# (we want max TP, not concurrency, for the fit check).
#
# Weight budget: 122 GB / TP=8 = 15.25 GB/chip. KV budget (seqs=64 × 32k
# × DP=1 = 2M tokens at FP8 KV): 2M / 8 = 250k tokens/chip × 16 KiB =
# ~4 GB/chip. Total: ~19.25 GB/chip → tiny fraction of 95 GiB/chip.
# Headroom for higher seqs if it works.
#
# Companion: S1 (v5p-8, TP=4 DP=1, same stack).

env_vars:
  RUNAI_STREAMER_CONCURRENCY: '4'
  MODEL_IMPL_TYPE: vllm
  AWS_ENDPOINT_URL: https://storage.googleapis.com

engine:
  type: vllm_local
  model: gs://marin-models-eu/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  max_output_tokens: 8192
  healthcheck_interval: 1800
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: gs://marin-models-eu/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  num_replicas: 1
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '48:00:00'
  max_model_len: 32768
  max_num_seqs: 64
  gpu_memory_utilization: 0.85
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  trust_remote_code: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  - --load-format
  - runai_streamer
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  - --max-num-batched-tokens
  - '32768'
