# Qwen3.5-122B-A10B-FP8 — v5p-32 Q11: 32k seqs=64 + FP8 KV.
#
# Pushes the seqs ladder one rung past Q10 (seqs=32 + FP8 KV = 1448 mean).
# Per-doubling deltas at 32k: +44% +120% +106% +80% +64% — diminishing
# but still positive. Test whether seqs=64 keeps producing throughput
# gains or whether Daytona feed (n_conc=128 sandboxes) becomes the
# bottleneck.
#
# KV budget: 64 * 32k * DP=2 = 4M tokens. With FP8 KV at TP=8 across 16
# chips: ~16 KiB/token / chip × 250k tokens/chip = ~4 GB/chip — fits
# inside the ~79 GiB free after FP8 weights.

env_vars:
  RUNAI_STREAMER_CONCURRENCY: '4'
  MODEL_IMPL_TYPE: vllm
  AWS_ENDPOINT_URL: https://storage.googleapis.com

engine:
  type: vllm_local
  model: gs://marin-models-us/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  max_output_tokens: 8192
  healthcheck_interval: 1800
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: gs://marin-models-us/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  num_replicas: 1
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  data_parallel_size: 2
  time_limit: '48:00:00'
  max_model_len: 32768
  max_num_seqs: 64
  gpu_memory_utilization: 0.85
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  trust_remote_code: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  - --load-format
  - runai_streamer
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  - --max-num-batched-tokens
  - '32768'
