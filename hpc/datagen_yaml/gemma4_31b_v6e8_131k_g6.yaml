# G6: D4 stack (prefix + chunked + FP8 KV) v6e-8 + 131k, seqs=4.
#
# G1/G2 at seqs=1 used ~20% KV. seqs=4 should consume ~80% (linear
# worst case, less with prefix cache hits). This is the **max viable
# concurrency** at 131k on v6e-8 — seqs=5+ likely OOMs.
#
# Harbor n_concurrent must match engine cap = 4. Set via launcher: --n_concurrent 4.
env_vars:
  MODEL_IMPL_TYPE: auto
engine:
  type: vllm_local
  model: google/gemma-4-31B-it
  max_output_tokens: 4096
  healthcheck_interval: 1800
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: google/gemma-4-31B-it
  num_replicas: 1
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '48:00:00'
  max_model_len: 131072
  max_num_seqs: 4
  gpu_memory_utilization: 0.85
  enable_expert_parallel: false
  enable_auto_tool_choice: true
  tool_call_parser: hermes
  reasoning_parser: gemma4
  trust_remote_code: false
  extra_args:
  - --dtype
  - bfloat16
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  - --max-num-batched-tokens
  - '16384'
  - --kv-cache-dtype
  - fp8
  - --enable-prefix-caching
  - --enable-chunked-prefill
