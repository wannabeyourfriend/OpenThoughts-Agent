# Qwen3.5-122B-A10B-FP8 — v5p-8 S1: TP=4 DP=1 seqs=64 + FP8 KV stack (fit ablation).
#
# Tests whether the 32k winner config (seqs=64 + FP8 KV + chunked-prefill +
# prefix-cache) fits on a single-host v5p-8 slice (4 chips, 380 GiB HBM
# total). FP8 weight_block_size [128,128] caps TP ≤ 8; v5p-8 has 4 chips
# so TP=4 is the natural pick. DP=1 (only one replica fits).
#
# Weight budget: 122 GB / TP=4 = 30.5 GB/chip. KV budget (seqs=64 × 32k ×
# DP=1 = 2M tokens at FP8 KV ~16 KiB/token / chip): with TP=4 spreading
# 2M tokens / 4 = 500k tokens/chip × 16 KiB = ~8 GB/chip. Total per chip:
# ~38.5 GB → well inside 95 GiB/chip.
#
# Companion: S2 (v5p-16, TP=8 DP=1, same stack).

env_vars:
  RUNAI_STREAMER_CONCURRENCY: '4'
  MODEL_IMPL_TYPE: vllm
  AWS_ENDPOINT_URL: https://storage.googleapis.com

engine:
  type: vllm_local
  model: gs://marin-models-us/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  max_output_tokens: 8192
  healthcheck_interval: 1800
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: gs://marin-models-us/ot-agent/models/Qwen/Qwen3.5-122B-A10B-FP8/
  num_replicas: 1
  tensor_parallel_size: 4
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '48:00:00'
  max_model_len: 32768
  max_num_seqs: 64
  gpu_memory_utilization: 0.85
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  trust_remote_code: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  - --load-format
  - runai_streamer
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  - --max-num-batched-tokens
  - '32768'
