# GLM-5.1-AWQ - AWQ 4-bit quantized (~754B params, ~392GB weights)
# https://huggingface.co/QuantTrio/GLM-5.1-AWQ
#
# 32K context variant, Jupiter GH200 multi-node — TP=8 / 2-node variant.
#
# Hardware: 2 nodes × 4x GH200 96GB = 8 GPUs (~768GB VRAM total)
#   - AWQ 4-bit weights (~392GB) → TP=8 cross-2-node (~49GB/GPU)
#   - 96GB - 49GB ≈ 47GB per GPU for KV cache + activations
#     (KV cache with fp8 + max_num_seqs=32 fits comfortably in ~30GB)
#   - DP=1 single replica spanning 2 nodes via NCCL TP over 1 IB hop pair
#     (vs the prior 4-node TP=16 layout, which had 3 IB boundaries
#     simultaneously and was suspected of being too slow/fragile —
#     449354 died at 04:06 UTC May 15 with TimeoutError on sample_tokens
#     after 3h of healthy serving)
#   - The new vLLM wheel's V1 engine has a multi-node DP regression
#     (vllm/v1/engine/utils.py:get_device_indices IndexError), so we
#     stay on DP=1 cross-node TP rather than 2x DP=1 single-node TP=4.

engine:
  type: vllm_local
  model: QuantTrio/GLM-5.1-AWQ
  max_output_tokens: 16384
  healthcheck_interval: 300
  request_params:
    temperature: 0.7
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: QuantTrio/GLM-5.1-AWQ
  num_replicas: 1
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '11:59:00'
  max_model_len: 32768
  max_num_seqs: 32
  gpu_memory_utilization: 0.9
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: glm47
  reasoning_parser: glm45
  trust_remote_code: true
  # Canonical zai-org / QuantTrio recommended env-var bundle for GLM-5.1.
  # vLLM defaults: DEEP_GEMM=True, FLASHINFER_SAMPLER=True, FLASHINFER_MOE_FP16=False.
  # We disable DEEP_GEMM and the FlashInfer sampler (the sampler is the path
  # that owns _topk_topp_kernel — its JIT-during-inference stall killed jobs
  # 448337, 448672, 448819, 448882 on cross-node TP=16). Enable FLASHINFER_MOE_FP16
  # which the AWQ recipe explicitly turns on.
  use_deep_gemm: false
  use_flashinfer_sampler: false
  use_flashinfer_moe_fp16: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  # JIT-deadlock protector. enforce_eager disables CUDA graphs + Inductor
  # so Triton kernels JIT in plain eager dispatch — JIT may happen once
  # on first hit, but it doesn't deadlock cross-rank coordination.
  # Per 449331/449354 evidence: with enforce_eager the engine ran healthy
  # for 3+ hours serving 32 concurrent reqs at ~100 tok/s gen throughput.
  - --enforce-eager
  # Force string-form content rendering through the chat template; zai-org's
  # official vLLM recipe sets this — GLM-5.1's template doesn't handle the
  # OpenAI list-of-dict content form that vLLM's `auto` mode may auto-select.
  - --chat-template-content-format
  - string
  # MTP speculative decoding was tried but enables async scheduling, which on
  # the new vLLM wheel disables NCCL DP sync and falls back to a broken
  # local-device-enumeration path → IndexError in
  # vllm/v1/engine/utils.py:get_device_indices on cross-node DP layouts.
  # Disabled until vLLM fixes the DP-coordinator device-enumeration logic.
  # - --speculative-config
  # - '{"method":"mtp","num_speculative_tokens":1}'
  # Prefill / caching: BOTH default-OFF now via hpc/vllm_utils.py's
  # `_DEFAULT_OFF_BOOLEAN_FLAGS`. The launcher injects `--no-enable-chunked-prefill`
  # and `--no-enable-prefix-caching` automatically when neither form is present
  # here. Reason: vLLM V1's default-True for these flags adds chunked-prefill
  # metadata + prefix-cache lookups to the first-traffic kernel set, which
  # JIT-compile mid-inference and stall the sample_tokens RPC → EngineDeadError
  # (Bug C iter 4-8). To re-enable for this YAML, add the flag back here OR set
  # `enable_chunked_prefill: true` / `enable_prefix_caching: true` at the top
  # level — both opt-in paths suppress the auto-injected `--no-...`.
  # With chunked prefill OFF (now the OT-Agent launcher default), vLLM requires
  # max_num_batched_tokens >= max_model_len — otherwise the prompt can't fit
  # in a single forward pass and the engine refuses to start with a Pydantic
  # SchedulerConfig validation error. Was 16384, raised to 32768 = max_model_len
  # (jupiter datagen 458718 died on this validation 2026-05-16 after the
  # default-off patch landed).
  - --max-num-batched-tokens
  - '32768'
