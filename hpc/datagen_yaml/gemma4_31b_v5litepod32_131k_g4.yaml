# G4: D4 stack (prefix + chunked + FP8 KV) on v5litepod-32 at 131k.
#
# Hardware: v5litepod-32 = 32 chips × 16 GB HBM = 512 GB total slice.
# Full slice utilization via TP=8 DP=4 (four replicas of 8 chips each).
# 2× total HBM vs v5litepod-16 (G3) and 2× vs v6e-8 (G1/G2). Per-replica
# chip count stays at 8 to avoid the gemma4 TP>8 vision-tower failure.
#
# DP=4 is more ambitious than DP=2 (G3). If DP=2 fails on v5litepod-16
# the same way it failed on v6e-16 (E1dp2), DP=4 here will fail too.
# But if v5e backend handles multi-replica DP cleanly, this gives us 4×
# parallel throughput vs G1.
#
# HBM accounting per chip (v5litepod-32, 16 GB) — identical to G3:
#   weights ≈ 8 GB, KV FP8 seqs=2 ≈ 6.5 GB, act ≈ 1-2 GB → ~16 GB tight.

env_vars:
  MODEL_IMPL_TYPE: auto
engine:
  type: vllm_local
  model: google/gemma-4-31B-it
  max_output_tokens: 4096
  healthcheck_interval: 1800
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
vllm_server:
  model_path: google/gemma-4-31B-it
  num_replicas: 1
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  data_parallel_size: 4
  time_limit: '48:00:00'
  max_model_len: 131072
  max_num_seqs: 2
  gpu_memory_utilization: 0.85
  enable_expert_parallel: false
  enable_auto_tool_choice: true
  tool_call_parser: hermes
  reasoning_parser: gemma4
  trust_remote_code: false
  extra_args:
  - --dtype
  - bfloat16
  - --block-size
  - '64'
  - --max-num-partial-prefills
  - '1'
  - --limit-mm-per-prompt
  - '{"image":0,"video":0}'
  - --max-num-batched-tokens
  - '16384'
  - --kv-cache-dtype
  - fp8
  - --enable-prefix-caching
  - --enable-chunked-prefill
