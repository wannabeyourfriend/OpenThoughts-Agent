# GLM-5.1-AWQ - AWQ 4-bit quantized (~586B params, ~300GB weights)
# https://huggingface.co/QuantTrio/GLM-5.1-AWQ
#
# 32K context variant, Jupiter GH200 multi-node
#
# Hardware: 4 nodes × 4x GH200 96GB = 16 GPUs (~1.5TB VRAM total)
#   - AWQ 4-bit weights (~300GB) → TP=16 cross-node (~19GB/GPU)
#   - 96GB - 19GB ≈ 77GB per GPU for KV cache + activations (very roomy)
#   - DP=1 single replica (the new vLLM wheel's V1 engine has a multi-node
#     DP regression: vllm/v1/engine/utils.py:get_device_indices crashes
#     with IndexError when trying to enumerate cross-node DP replica GPU
#     indices). Until vLLM fixes this, we use TP=16/DP=1 — single replica
#     spanning all 4 nodes via NCCL TP over IB.

engine:
  type: vllm_local
  model: QuantTrio/GLM-5.1-AWQ
  max_output_tokens: 16384
  healthcheck_interval: 300
  request_params:
    temperature: 0.7
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: QuantTrio/GLM-5.1-AWQ
  num_replicas: 1
  tensor_parallel_size: 16
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '11:59:00'
  max_model_len: 32768
  max_num_seqs: 32
  gpu_memory_utilization: 0.9
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: glm47
  reasoning_parser: glm45
  trust_remote_code: true
  # Canonical zai-org / QuantTrio recommended env-var bundle for GLM-5.1.
  # vLLM defaults: DEEP_GEMM=True, FLASHINFER_SAMPLER=True, FLASHINFER_MOE_FP16=False.
  # We disable DEEP_GEMM and the FlashInfer sampler (the sampler is the path
  # that owns _topk_topp_kernel — its JIT-during-inference stall killed jobs
  # 448337, 448672, 448819, 448882 on cross-node TP=16). Enable FLASHINFER_MOE_FP16
  # which the AWQ recipe explicitly turns on.
  use_deep_gemm: false
  use_flashinfer_sampler: false
  use_flashinfer_moe_fp16: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  # Force string-form content rendering through the chat template; zai-org's
  # official vLLM recipe sets this — GLM-5.1's template doesn't handle the
  # OpenAI list-of-dict content form that vLLM's `auto` mode may auto-select.
  - --chat-template-content-format
  - string
  # MTP speculative decoding was tried but enables async scheduling, which on
  # the new vLLM wheel disables NCCL DP sync and falls back to a broken
  # local-device-enumeration path → IndexError in
  # vllm/v1/engine/utils.py:get_device_indices on cross-node DP layouts.
  # Disabled until vLLM fixes the DP-coordinator device-enumeration logic.
  # - --speculative-config
  # - '{"method":"mtp","num_speculative_tokens":1}'
  # Prefill / caching optimizations
  # NOTE: --enable-chunked-prefill REMOVED for 449086 follow-up.
  # On 449086 (FlashInfer sampler disabled), _topk_topp_kernel no longer
  # JIT'd, but _build_prefill_chunk_metadata_kernel (the chunked-prefill
  # scheduler kernel) still JIT-compiled mid-inference at 22:52:22 and
  # produced the identical cross-node NCCL coordination hang we saw on
  # 448882. Disabling chunked prefill eliminates this kernel entirely.
  # Trade-off: prefill on prompts > max-num-batched-tokens (16384) becomes
  # single-shot rather than chunked, which is fine for stackexchange-tezos
  # since most prompts are well under 16k.
  # - --enable-chunked-prefill
  # - --max-num-partial-prefills
  # - '1'
  - --enable-prefix-caching
  - --max-num-batched-tokens
  - '16384'
