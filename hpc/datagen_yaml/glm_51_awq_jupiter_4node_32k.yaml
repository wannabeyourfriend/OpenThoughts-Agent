# GLM-5.1-AWQ - AWQ 4-bit quantized (~586B params, ~300GB weights)
# https://huggingface.co/QuantTrio/GLM-5.1-AWQ
#
# 32K context variant, Jupiter GH200 multi-node
#
# Hardware: 4 nodes × 4x GH200 96GB = 16 GPUs (~1.5TB VRAM total)
#   - AWQ 4-bit weights (~300GB) → TP=4 within node (~75GB/GPU)
#   - 96GB - 75GB ≈ 21GB per GPU for KV cache + activations
#   - GH200 unified memory: fp8 KV cache + swap_space=32 give host-RAM headroom
#   - DP=4 (one replica per node)

engine:
  type: vllm_local
  model: QuantTrio/GLM-5.1-AWQ
  max_output_tokens: 16384
  healthcheck_interval: 300
  request_params:
    temperature: 0.7
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: QuantTrio/GLM-5.1-AWQ
  num_replicas: 1
  tensor_parallel_size: 4
  pipeline_parallel_size: 1
  data_parallel_size: 4
  time_limit: '11:59:00'
  max_model_len: 32768
  max_num_seqs: 32
  gpu_memory_utilization: 0.9
  swap_space: 32
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: glm47
  reasoning_parser: glm45
  trust_remote_code: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  # MTP speculative decoding (1 draft token — low overhead, ~30% speedup)
  - --speculative-config
  - '{"method":"mtp","num_speculative_tokens":1}'
  # Prefill / caching optimizations
  - --enable-chunked-prefill
  - --max-num-partial-prefills
  - '1'
  - --enable-prefix-caching
  - --max-num-batched-tokens
  - '16384'
