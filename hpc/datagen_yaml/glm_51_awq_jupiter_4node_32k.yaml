# GLM-5.1-AWQ - AWQ 4-bit quantized (~586B params, ~300GB weights)
# https://huggingface.co/QuantTrio/GLM-5.1-AWQ
#
# 32K context variant, Jupiter GH200 multi-node
#
# Hardware: 4 nodes × 4x GH200 96GB = 16 GPUs (~1.5TB VRAM total)
#   - AWQ 4-bit weights (~300GB) → TP=16 cross-node (~19GB/GPU)
#   - 96GB - 19GB ≈ 77GB per GPU for KV cache + activations (very roomy)
#   - DP=1 single replica (the new vLLM wheel's V1 engine has a multi-node
#     DP regression: vllm/v1/engine/utils.py:get_device_indices crashes
#     with IndexError when trying to enumerate cross-node DP replica GPU
#     indices). Until vLLM fixes this, we use TP=16/DP=1 — single replica
#     spanning all 4 nodes via NCCL TP over IB.

engine:
  type: vllm_local
  model: QuantTrio/GLM-5.1-AWQ
  max_output_tokens: 16384
  healthcheck_interval: 300
  request_params:
    temperature: 0.7
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: QuantTrio/GLM-5.1-AWQ
  num_replicas: 1
  tensor_parallel_size: 16
  pipeline_parallel_size: 1
  data_parallel_size: 1
  time_limit: '11:59:00'
  max_model_len: 32768
  max_num_seqs: 32
  gpu_memory_utilization: 0.9
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: glm47
  reasoning_parser: glm45
  trust_remote_code: true
  # Canonical zai-org / QuantTrio recommended env-var bundle for GLM-5.1.
  # vLLM defaults: DEEP_GEMM=True, FLASHINFER_SAMPLER=True, FLASHINFER_MOE_FP16=False.
  # We disable DEEP_GEMM and the FlashInfer sampler (the sampler is the path
  # that owns _topk_topp_kernel — its JIT-during-inference stall killed jobs
  # 448337, 448672, 448819, 448882 on cross-node TP=16). Enable FLASHINFER_MOE_FP16
  # which the AWQ recipe explicitly turns on.
  use_deep_gemm: false
  use_flashinfer_sampler: false
  use_flashinfer_moe_fp16: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  # NUCLEAR OPTION (iteration 4 of Bug C unblock chain). 449287 showed that
  # _build_prefill_chunk_metadata_kernel JITs mid-inference even with BOTH
  # --enable-chunked-prefill AND --enable-prefix-caching disabled — meaning
  # the kernel is reached through a third code path we haven't identified
  # (likely the base scheduler when computing block metadata for any prompt
  # longer than max_num_batched_tokens or just routine prefill bookkeeping).
  # --enforce-eager disables CUDA graphs AND Inductor compilation entirely;
  # all kernels run in eager (PyTorch-dispatch) mode → no Triton JIT.
  # Cost: ~2x slower per-token; acceptable since the engine has been at
  # zero useful throughput for 4 iterations now.
  - --enforce-eager
  # Force string-form content rendering through the chat template; zai-org's
  # official vLLM recipe sets this — GLM-5.1's template doesn't handle the
  # OpenAI list-of-dict content form that vLLM's `auto` mode may auto-select.
  - --chat-template-content-format
  - string
  # MTP speculative decoding was tried but enables async scheduling, which on
  # the new vLLM wheel disables NCCL DP sync and falls back to a broken
  # local-device-enumeration path → IndexError in
  # vllm/v1/engine/utils.py:get_device_indices on cross-node DP layouts.
  # Disabled until vLLM fixes the DP-coordinator device-enumeration logic.
  # - --speculative-config
  # - '{"method":"mtp","num_speculative_tokens":1}'
  # Prefill / caching optimizations
  # NOTE: --enable-chunked-prefill + --enable-prefix-caching BOTH REMOVED.
  # - 448882, 449086: both kernels (_topk_topp_kernel + _build_prefill_chunk_metadata_kernel)
  #   JIT'd mid-inference. Disabling FlashInfer sampler killed the first kernel.
  # - 449156: only chunked prefill disabled. _build_prefill_chunk_metadata_kernel
  #   STILL JIT'd at 01:06:20 (10 sec after first request). The kernel is also
  #   reachable through the prefix-caching codepath, which uses it to determine
  #   which prefix-cache blocks are reusable for a new prompt. Disabling prefix
  #   caching as well should be the final required cut.
  # Trade-offs: no chunked prefill (single-shot on >16k prompts; rare for our
  # traffic) and no prefix-cache reuse (every request pays full prefill cost,
  # but cache hits were 0% on stackexchange-tezos anyway since tasks are diverse).
  # - --enable-chunked-prefill
  # - --max-num-partial-prefills
  # - '1'
  # - --enable-prefix-caching
  # With chunked prefill OFF (now the OT-Agent launcher default), vLLM requires
  # max_num_batched_tokens >= max_model_len. Was 16384, raised to 32768 to
  # match max_model_len so prompts fit in a single forward pass.
  - --max-num-batched-tokens
  - '32768'
