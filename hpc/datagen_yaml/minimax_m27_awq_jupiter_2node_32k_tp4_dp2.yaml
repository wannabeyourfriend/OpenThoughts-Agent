# MiniMax-M2.7-AWQ-4bit — AWQ 4-bit quantized (~229B params)
# https://huggingface.co/cyankiwi/MiniMax-M2.7-AWQ-4bit
#
# 32K context — Jupiter GH200 2-node TP=4 / DP=2 variant.
#
# Hardware: 2 nodes × 4× GH200 96GB = 8 GPUs total (~768 GB VRAM)
#   - Each DP replica owns one full node (TP=4 within node):
#     * AWQ 4-bit weights ~115 GB → TP=4 → ~29 GB/GPU
#     * 96 GB - 29 GB ≈ 67 GB/GPU for KV + activations (very roomy,
#       same as the proven dp=1 single-node baseline)
#   - 2 DP replicas → 2× throughput at the cost of one extra node
#   - All TP cross-rank traffic stays within a node (no cross-node TP
#     RPC, no IB-bandwidth pressure on the hot path)
#   - DP coordination IS cross-node (TCPStore between the two engine
#     replicas), but it's only metadata (request routing) — not the
#     hot sample_tokens RPC path that breaks at TP-across-nodes
#
# Compared to the 1node_32k_dp2 sibling (TP=2 DP=2 single-node):
#   - TP=4 → less memory pressure per GPU, no need to drop
#     gpu_memory_utilization to 0.85
#   - DP coordination now goes through the inter-node fabric (was
#     loopback for single-node), which is a different test surface
#   - More representative of the long-context configs we want to ramp
#     to next (TP=4 leaves room for ≥64K context per the memory math)
#
# Compared to the 1node_32k baseline (TP=4 DP=1):
#   - Adds DP=2 → 2x throughput once dp>1 is validated
#   - Tests vLLM's mp DP coordinator across nodes (replaces the
#     known-bad single-node Ray-DP path that hit Bug E + the
#     known-bad single-node mp-DP path that hit Bug F's c10d
#     IPv6 hostname leak)
#
# Required launch flags:
#   --num_nodes 2 --gpus_per_node 4

engine:
  type: vllm_local
  model: cyankiwi/MiniMax-M2.7-AWQ-4bit
  max_output_tokens: 8192
  healthcheck_interval: 300
  request_params:
    temperature: 0.7
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: cyankiwi/MiniMax-M2.7-AWQ-4bit
  num_replicas: 1
  tensor_parallel_size: 4
  pipeline_parallel_size: 1
  data_parallel_size: 2
  time_limit: '11:59:00'
  max_model_len: 32768
  max_num_seqs: 32
  gpu_memory_utilization: 0.9
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: minimax_m2
  reasoning_parser: minimax_m2
  trust_remote_code: true
  use_deep_gemm: false
  use_flashinfer_sampler: false
  use_flashinfer_moe_fp16: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  - --enforce-eager
  - --chat-template-content-format
  - string
  - --max-num-batched-tokens
  - '32768'
  # NOTE on DP backend: we leave `--data-parallel-backend` unset, so
  # vLLM picks its default (`mp` / torch.distributed coordinator).
  # The Ray DP backend hit Bug E (DPMoEEngineCoreActor placed on
  # CPU-only control bundle → empty get_accelerator_ids() → fail);
  # patched in our local vLLM via the control-bundle fallback +
  # combined loud-fail raise. The mp coordinator path hit Bug F
  # (c10d resolves Jupiter hostnames to IPv6); not yet fully fixed
  # — the Python getaddrinfo monkey-patch in vllm/env_override.py
  # gated on VLLM_FORCE_IPV4=1 doesn't reach libtorch's libc-level
  # DNS calls. If 482064-style c10d errors recur on this config,
  # try (in this order):
  #   1. NCCL_SOCKET_IFNAME=ib0 (already set in jupiter env_vars)
  #   2. GLOO_SOCKET_IFNAME=ib0 (NOT currently set — comment in
  #      hpc/hpc.py:772 warns that ib0 resolves to IPv6, but on a
  #      2-node config the cross-node TCPStore may need it)
  #   3. LD_PRELOAD shim that filters AF_INET6 at libc level
  # vllm_utils.VLLMServer.start() auto-injects
  # `--data-parallel-address <ray_cluster.head_ip>` when
  # data_parallel_size > 1, so the DP master URL is always an
  # IPv4 literal (avoids the localhost → IPv6 bind error).
