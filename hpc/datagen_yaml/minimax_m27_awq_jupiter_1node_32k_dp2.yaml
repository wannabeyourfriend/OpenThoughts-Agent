# MiniMax-M2.7-AWQ-4bit — AWQ 4-bit quantized (~229B params)
# https://huggingface.co/cyankiwi/MiniMax-M2.7-AWQ-4bit
#
# 32K context variant, Jupiter GH200 single-node — DP=2 / TP=2 variant.
#
# Hardware: 1 node × 4x GH200 96GB = 4 GPUs (~384GB VRAM total)
#   - AWQ 4-bit weights ~115GB → per replica TP=2 → ~58GB/GPU
#   - 96GB - 58GB ≈ 38GB per GPU for KV cache + activations
#     (vs ~67GB at TP=4 in the dp=1 sibling — tighter but workable
#      because MiniMax-M2.7 has only 32K context and we cap
#      max_num_seqs=32)
#   - DP=2 means 2 independent vLLM engine replicas on the same node
#     sharing the head-port via vLLM's internal data-parallel router;
#     no cross-node RPC, but does exercise the multi-replica path the
#     dp=1 config explicitly avoided.
#
# Purpose: unblock + validate the data_parallel_size > 1 path for
# MiniMax-M2.7. The dp=1 sibling exists as the "safe" variant we know
# works end-to-end against the GLM-5.1-AWQ cross-node sample_tokens
# RPC timeout class of bugs. This sibling tests whether dp>1 is
# usable WITHOUT pulling in the cross-node coordination layer.
#
# Compared to the dp=1 sibling:
#   - tensor_parallel_size: 4 -> 2
#   - data_parallel_size: 1 -> 2
#   - gpu_memory_utilization: 0.9 -> 0.85 (smaller KV budget per GPU)
#   - Everything else (enforce-eager, no-deep-gemm, no-flashinfer-sampler,
#     chat template, max_num_batched_tokens) kept identical to isolate
#     the dp>1 axis as the only variable.

engine:
  type: vllm_local
  model: cyankiwi/MiniMax-M2.7-AWQ-4bit
  max_output_tokens: 8192
  healthcheck_interval: 300
  request_params:
    temperature: 0.7
    top_p: 0.95
  vllm_local: {}
backend:
  type: ray
  wait_for_endpoint: true
  ray_cgraph_max_inflight_executions: 16
  healthcheck_max_attempts: 160
  healthcheck_retry_delay: 15
vllm_server:
  model_path: cyankiwi/MiniMax-M2.7-AWQ-4bit
  num_replicas: 1
  tensor_parallel_size: 2
  pipeline_parallel_size: 1
  data_parallel_size: 2
  time_limit: '11:59:00'
  max_model_len: 32768
  max_num_seqs: 32
  gpu_memory_utilization: 0.85
  enable_expert_parallel: true
  enable_auto_tool_choice: true
  tool_call_parser: minimax_m2
  reasoning_parser: minimax_m2
  trust_remote_code: true
  use_deep_gemm: false
  use_flashinfer_sampler: false
  use_flashinfer_moe_fp16: true
  extra_args:
  - --dtype
  - bfloat16
  - --kv-cache-dtype
  - fp8
  - --enforce-eager
  - --chat-template-content-format
  - string
  - --max-num-batched-tokens
  - '32768'
  # DP coordinator must use Ray (not the default `mp` torch.distributed
  # TCP-store path). Without this, vLLM's DPLBAsyncMPClient hits
  # `socket.cpp:764: [c10d] The client socket cannot be initialized to
  # connect to [localhost]:N (errno: 97 - Address family not supported
  # by protocol)` — torch's c10d resolves "localhost" to IPv6 ::1 even
  # though GLOO_USE_IPV6=0 + NCCL_SOCKET_FAMILY=AF_INET are exported on
  # the node. Routing DP through Ray actors sidesteps the c10d socket
  # entirely; Ray is already up (start_vllm_ray_controller.py started
  # it) so this is a zero-cost re-route.
  - --data-parallel-backend
  - ray
  # Belt-and-suspenders: force the DP coordinator to bind on the node's
  # explicit IPv4 even when `mp` backend is somehow re-enabled. Bound
  # at controller-spawn time so $VLLM_HOST_IP env var (set by vLLM
  # controller per hpc/vllm_utils.py:362) is in scope.
  - --data-parallel-address
  - 127.0.0.1
