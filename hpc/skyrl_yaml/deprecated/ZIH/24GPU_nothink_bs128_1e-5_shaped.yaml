# SkyRL Configuration: Qwen3 8B on 24 GPUs (6 nodes x 4 GPUs) - RLOO-N + Strict JSON + Shaped Rewards
# Based on: 24GPU_nothink_bs128_1e-5.yaml
#
# SHAPED REWARD VARIANT:
#   - enable_reward_shaping: true (partial credit based on test pass ratios)
#   - reward_shaper: pass_ratio (passed_tests / total_tests)
#   - reward_shaping_fallback: true (fall back to binary reward if parsing fails)
#
# 24 GPU VARIANT:
#   - Total GPUs: 24 (6 nodes x 4 GPUs)
#   - Inference engines: 16 (dedicated GPUs)
#   - Policy/Reference: 8 shared GPUs (colocated via async RLOO-N)
#   - micro_train_batch_size_per_gpu: 1 (from base micro1x4 config)
#   - micro_forward_batch_size_per_gpu: 4
#
# Usage:
#   python -m hpc.launch \
#       --job_type rl \
#       --rl_config ALCC_ZIH/24GPU_nothink_bs128_1e-5_shaped.yaml \
#       --job_name qwen3_8b_24gpu_shaped \
#       --train_data '["mlfoundations-dev/your-dataset"]' \
#       --model_path Qwen/Qwen3-8B \
#       --num_nodes 6

# SkyRL entrypoint module
entrypoint: examples.terminal_bench.entrypoints.main_tbench

# Hydra config groups (+ prefix in CLI)
config_groups:
  terminal_bench_config: terminal_bench

# Terminal bench / agentic environment settings
terminal_bench:
  # trials_dir: Directory for Harbor trial artifacts (derived from experiments_dir if null)
  trials_dir: null

  # Harbor configuration - schema-driven mapping to TrialConfig
  harbor:
    # Agent settings
    name: terminus-2
    max_episodes: 999999
    enable_summarize: false
    store_all_messages: true
    enable_episode_logging: false
    record_terminal_session: false
    enable_pane_logging: false

    # Strict JSON parser
    strict_json_parser: true

    # Interleaved Thinking Settings
    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
      response_prefix: "<think>\n\n</think>\n\n{\n  \"analysis\": \""
    # Timeout settings
    override_timeout_sec: 1500

    # Environment settings
    override_cpus: 1
    override_memory_mb: 2048
    override_storage_mb: 2048

    # ==========================================================================
    # AUTO SNAPSHOT: Reduce Daytona rate limits with hash-based snapshot caching
    # ==========================================================================
    auto_snapshot: true

    # Verifier settings
    verifier_override_timeout_sec: 120

    # Retry settings
    max_retries: 3
    min_wait_sec: 60.0
    max_wait_sec: 600.0
    wait_multiplier: 2.0

    exclude_exceptions:
      - VerifierTimeoutError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError

    # Orchestrator settings (432 = 384 base + 48 for 4 additional engines)
    n_concurrent_trials: 320

    # Logging settings
    log_level: INFO

    # ==========================================================================
    # Reward shaping (shaped - partial credit based on test pass ratios)
    # ==========================================================================
    enable_reward_shaping: true
    reward_parser: null            # Auto-detect (pytest, unittest, generic)
    reward_shaper: pass_ratio      # Simple mean: passed_tests / total_tests
    reward_shaping_fallback: true  # Fall back to original reward if parsing fails

    # RLOO-N error classification
    enable_error_classification: true
    mask_exceptions:
      - DaytonaError
      - EnvironmentStartTimeoutError
      - NetworkError
      - ConnectionError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - AgentEnvironmentTimeoutError
    zero_exceptions:
    default_error_treatment: zero
    passthrough_exceptions:
      - AgentTimeoutError
      - ContextLengthExceededError

  # Model info for Harbor's hosted_vllm validation
  model_info:
    max_input_tokens: 32768
    max_output_tokens: 8192

  archiving:
    # Enable trial archiving callback
    enabled: false

# Trainer configuration
trainer:
  strategy: fsdp2
  algorithm:
    advantage_estimator: rloo_n
    use_kl_loss: false
    kl_loss_coef: 0.0
    eps_clip_low: 0.2
    eps_clip_high: 0.2
    loss_reduction: token_mean

  # Training loop settings
  epochs: 2
  update_epochs_per_batch: 1

  # Batch sizes
  train_batch_size: 128
  policy_mini_batch_size: 128
  eval_batch_size: 128

  # Micro batch sizes (micro1x4 variant)
  micro_forward_batch_size_per_gpu: 4
  micro_train_batch_size_per_gpu: 1

  max_prompt_length: 999999

  # Evaluation and checkpointing
  eval_interval: 999999
  eval_before_train: false
  # Resumable checkpointing
  ckpt_interval: 3
  resume_mode: latest
  # HF upload-ready checkpoints
  hf_save_interval: 5
  # HuggingFace Hub upload (set via CLI: trainer.hf_hub_repo_id=org/repo)
  hf_hub_repo_id: null
  hf_hub_private: false
  hf_hub_revision: main

  # Database registration (auto-registers trained model to Supabase)
  enable_db_registration: true

  # Logging
  project_name: OpenThoughts-Agent
  log_level: INFO
  tracker_commit_each_step: true

  # Paths
  run_name: null
  ckpt_path: null
  export_path: null

  # Policy optimizer
  policy:
    optimizer_config:
      lr: 8e-6
      weight_decay: 0.0
      adam_betas: [0.9, 0.999]
      max_grad_norm: 10.0
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: false
      fsdp_size: 4
  # Reference model
  ref:
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: false
      fsdp_size: 4

  # Model placement (async training) - 8 shared GPUs for policy/ref
  placement:
    colocate_all: false
    policy_num_nodes: 2
    ref_num_nodes: 2
    policy_num_gpus_per_node: 4
    ref_num_gpus_per_node: 4

  # Fully async generation (settings from v2_maxconcurrent)
  fully_async:
    max_staleness_steps: 12
    num_parallel_generation_workers: 768

# Generator configuration
generator:
  backend: vllm
  timeout_multiplier: 2.0
  model_dtype: bfloat16

  inference_engine_tensor_parallel_size: 1
  # 16 inference engines (24 total GPUs: 16 engines + 8 policy/ref shared)
  num_inference_engines: 16

  n_samples_per_prompt: 8
  eval_n_samples_per_prompt: 8

  gpu_memory_utilization: 0.90

  max_num_seqs: 32
  max_num_batched_tokens: 16384

  enable_prefix_caching: true
  enable_chunked_prefill: true

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true
  enable_ray_prometheus_stats: false

  append_eos_token_after_stop_str_in_multi_turn: true
  max_turns: 999999

  sampling_params:
    max_generate_length: 8192
    temperature: 0.7
    top_p: 0.95
    top_k: 20

  engine_init_kwargs:
    max_model_len: 32768

# Data paths
data:
  train_data: []
  val_data: ["open-thoughts/OpenThoughts-TB-dev"]
