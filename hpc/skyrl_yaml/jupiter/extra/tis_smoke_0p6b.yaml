entrypoint: examples.terminal_bench.entrypoints.main_tbench

# =============================================================================
# TIS smoke test (Qwen3-0.6B, agentic harbor+daytona+vLLM path).
# Validates the hardened TIS rollout-logprob alignment end-to-end:
#   - use_tis=true + collect_rollout_details=true
#   - at step 0 (on-policy) the TIS imp-ratio (tis/imp_ratio_mean) ~ 1.0
#   - the exact token-id alignment path fires (generate/tis/exact_match_fraction
#     ~ 1.0) and the LCS fallback does NOT silently fire
#     (generate/tis/lcs_fallback_fraction ~ 0)
# Based on jupiter/24GPU_base.yaml (proven agentic disaggregated layout),
# shrunk to a 0.6B model and a handful of steps.
# =============================================================================

# Hydra config groups (+ prefix in CLI)
config_groups:
  terminal_bench_config: terminal_bench

terminal_bench:
  trials_dir: null

  harbor:
    name: terminus-2
    max_episodes: 999999
    enable_summarize: false
    store_all_messages: true
    trajectory_config:
      raw_content: true
    enable_episode_logging: false
    record_terminal_session: false
    enable_pane_logging: false

    strict_json_parser: true

    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    override_timeout_sec: 1800

    override_cpus: 1
    override_memory_mb: 2048
    override_storage_mb: 2048

    auto_snapshot: true

    verifier_override_timeout_sec: 120

    max_retries: 3
    min_wait_sec: 60.0
    max_wait_sec: 600.0
    wait_multiplier: 2.0

    exclude_exceptions:
      - VerifierTimeoutError
      - VerifierRuntimeError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError

    n_concurrent_trials: 64

    log_level: INFO

    enable_reward_shaping: false

    # TIS REQUIRES this: makes Harbor request + store per-token rollout logprobs
    # AND completion_token_ids from vLLM (the exact-alignment inputs).
    collect_rollout_details: true

    enable_error_classification: true
    mask_exceptions:
      - DaytonaError
      - EnvironmentStartTimeoutError
      - NetworkError
      - ConnectionError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - AgentEnvironmentTimeoutError
    default_error_treatment: zero
    passthrough_exceptions:
      - AgentTimeoutError
      - ContextLengthExceededError

  model_info:
    max_input_tokens: 32767
    max_output_tokens: 4096

  archiving:
    enabled: false

  trace_upload:
    enabled: false

trainer:
  strategy: fsdp2
  algorithm:
    advantage_estimator: rloo_n
    use_kl_loss: false
    kl_loss_coef: 0.0
    eps_clip_low: 0.2
    eps_clip_high: 0.05
    loss_reduction: token_mean

    # --- TIS ---
    # Multiplies the policy loss by clamp(exp(old_log_probs - rollout_logprobs),
    # max=tis_imp_ratio_cap). At step 0 (on-policy) old≈rollout so ratio≈1.0.
    use_tis: true
    tis_imp_ratio_cap: 2.0

  epochs: 1
  max_steps: 4
  update_epochs_per_batch: 1

  train_batch_size: 16
  policy_mini_batch_size: 16
  eval_batch_size: 16

  micro_forward_batch_size_per_gpu: 4
  micro_train_batch_size_per_gpu: 1

  max_prompt_length: 999999

  eval_interval: 999999
  eval_before_train: false
  ckpt_interval: 999999
  resume_mode: latest
  hf_save_interval: 999999
  hf_hub_repo_id: null
  hf_hub_private: false
  hf_hub_revision: main

  enable_db_registration: false

  project_name: OpenThoughts-Agent
  log_level: INFO
  tracker_commit_each_step: true
  logger: console

  run_name: null
  ckpt_path: null
  export_path: null

  policy:
    optimizer_config:
      lr: 8e-6
      weight_decay: 0.0
      adam_betas: [0.9, 0.999]
      max_grad_norm: 0.9
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: true
      fsdp_size: 4
  ref:
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: true
      fsdp_size: 4

  placement:
    colocate_all: false
    policy_num_nodes: 1
    ref_num_nodes: 1
    policy_num_gpus_per_node: 4
    ref_num_gpus_per_node: 4

  fully_async:
    max_staleness_steps: 16
    num_parallel_generation_workers: 32

generator:
  backend: vllm
  timeout_multiplier: 1.0
  model_dtype: bfloat16

  inference_engine_tensor_parallel_size: 1
  # 4 inference engines (12 total GPUs: 4 engines + 4 policy + 4 ref) = 3 nodes
  num_inference_engines: 4

  n_samples_per_prompt: 4
  eval_n_samples_per_prompt: 4

  gpu_memory_utilization: 0.75

  max_num_seqs: 16
  max_num_batched_tokens: 65536

  enable_prefix_caching: true
  enable_chunked_prefill: true

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true
  enable_ray_prometheus_stats: false
  vllm_stats_interval: 1
  append_eos_token_after_stop_str_in_multi_turn: true
  max_turns: 999999

  sampling_params:
    max_generate_length: 4096
    temperature: 0.7
    top_p: 0.95
    top_k: 20

  engine_init_kwargs:
    max_model_len: 32768
    custom_chat_template_chat_completion_path: chat_templates/qwen3_thinking_acc.jinja2

data:
  train_data: []
  val_data: []
