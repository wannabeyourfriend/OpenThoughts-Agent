# SkyRL Config: Lever 1 — dense-8B agentic RL at 131k context, plain FSDP2 (NO CP/DCP).
# =============================================================================
# WHAT THIS IS: the Lever-1 "RL the canonical SFT baseline at 131k for compactness"
# arm (experiments/ablation_exploration_in_rl/plan_lever1_rl_131k_compactness.md).
# It is the GEOMETRY of 24GPU_base_131k.yaml (131k + YaRN factor 4, plain FSDP2,
# TP=1 engines, NO context/decode parallelism) crossed with the ALGORITHM block of
# 56GPU_seqnorm_tis_untrunc_symclip.yaml (the proven dense-8B arm: RLOO-n seqnorm +
# TIS + symmetric clip 0.2/0.2 + untruncated sampling).
#
# DECISIONS LOCKED (plan §6, user 2026-06-17):
#   - PURE-SOLVE first, NO length penalty: enable_reward_shaping=false (binary verifier).
#   - Base = laion/GLM-4_7-swesmith-...-131k-fixthink (Qwen3-8B SFT positive control).
#   - Geometry-1 = plain FSDP2 (this file). CP=2 fallback (#232 _cp tooling) only on OOM.
#   - Data = exp_rpt_pymethods2test-large (comparable to prior 32k arms).
#   - This is the <=2-step SMOKE (max_steps=2): probe (a) 8B-dense fits + takes a GRPO
#     step at 131k under FSDP4 + grad-ckpt (no #232 CP tooling needed), and (b) the GLM
#     prior stays coherent / keeps terminating when RL touches it at 131k. If green, it
#     continues as the full pure-solve arm.
#
# WHY independent of #232: #232's wall is the 30B-MoE DCP=2 -> TP8 -> cross-node-TP
# decode 900s timeout. An 8B DENSE model fits a vLLM engine at TP=1 on ONE GH200 96GB
# -> NO cross-node decode all-reduce at all, and (no EP, no CP) the FSDP2 mesh is <=2-D
# (the ndim=4 gap is never exercised). So Geometry-1 shares none of #232's pillars.
#
# GPU ALLOCATION (colocate_all=false, 4 GPUs/node):
#   - Policy + Ref (shared): 2 nodes x 4 GPUs = 8 GPUs (FSDP4)
#   - Inference engines:     4 nodes x 4 GPUs = 16 engines (TP=1)
#   - Total:                 6 nodes x 4 GPUs = 24 GPUs  -> --num_nodes 6
#
# YARN RoPE SCALING: factor 3.2 (40960 * 3.2 = 131072), applied in BOTH trainer
# (rope_scaling) and vLLM (engine hf_overrides). GLM-4.7-swesmith is a Qwen3-8B with
# NATIVE max_position_embeddings=40960 (NOT 32768), so the #232 pattern (3.2/40960)
# is correct here; the original 4.0/32768 (copied from 24GPU_base_131k.yaml) mismatched
# the model's native and was rejected at the vLLM ModelConfig gate.
# =============================================================================

entrypoint: examples.terminal_bench.entrypoints.main_tbench

# RL container section — extra_env ONLY (no `sif`), so this does NOT activate the
# Apptainer path: the job still runs the bare host RL venv (envs/rl). The launcher's
# _build_rl_container_env emits these as `export K=V` lines into the sbatch, inherited
# by every Ray head/worker (incl. the vLLM engine actors) via `srun --export=ALL`.
#
# VLLM_ALLOW_LONG_MAX_MODEL_LEN=1: GLM-4.7-swesmith (Qwen3-8B) has native
# max_position_embeddings=40960. On the RL-venv vLLM build, the matched YaRN
# (3.2/40960) below does NOT lift the derived max_model_len before the ModelConfig
# gate runs (it still derives 40960 and rejects 131072 — observed in jobs 912743 &
# 913087, where the vLLM engine actors died on a ValidationError and
# init_weight_sync_state then failed at global_step 0). The proven #232 path avoids
# this because it runs a DIFFERENT vLLM build inside the _cp.sif. Since the YaRN IS
# matched (positions ≤131072 are valid under YaRN, no nan risk), this env var just
# bypasses the over-conservative derived-len gate, which is the documented remedy
# (and the vLLM error message's own suggestion).
container:
  extra_env:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1

# Hydra config groups (+ prefix in CLI)
config_groups:
  terminal_bench_config: terminal_bench

# Terminal bench / agentic environment settings
terminal_bench:
  # trials_dir: Directory for Harbor trial artifacts (derived from experiments_dir if null)
  trials_dir: null

  # Harbor configuration - schema-driven mapping to TrialConfig
  harbor:
    # Agent settings
    name: terminus-2
    max_episodes: 999999
    # Compact NATIVELY at 131k — do NOT lean on summarization during RL rollout
    # (that is the whole point of Lever 1). The eval harness uses summarization at
    # 32k; that train/eval mismatch is the plan's §4 decision, not a rollout setting.
    enable_summarize: false
    store_all_messages: true
    trajectory_config:
      raw_content: true
    enable_episode_logging: false
    record_terminal_session: false
    enable_pane_logging: false

    # Strict JSON parser
    strict_json_parser: true

    # Interleaved Thinking Settings
    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    # 900s agent-timeout (the proven a3 value — 1800s starved the buffer; see
    # 56GPU_seqnorm_tis_untrunc_symclip.yaml). AgentTimeoutError stays PASSTHROUGH.
    override_timeout_sec: 900

    # Environment settings
    override_cpus: 1
    override_memory_mb: 2048
    override_storage_mb: 2048

    # AUTO SNAPSHOT: hash-based snapshot caching to reduce Daytona rate limits.
    auto_snapshot: true

    # Verifier settings
    verifier_override_timeout_sec: 120

    # Retry settings
    max_retries: 3
    min_wait_sec: 60.0
    max_wait_sec: 600.0
    wait_multiplier: 2.0

    exclude_exceptions:
      - VerifierTimeoutError
      - VerifierRuntimeError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError

    # Per-job Daytona sandbox concurrency (does NOT affect the cross-cluster
    # RUNNING-RL job cap of <=6). 675 mirrors the dense-8B symclip arm.
    n_concurrent_trials: 675

    # Logging settings
    log_level: INFO

    # Reward shaping DISABLED — pure-solve binary verifier (plan §1.3 Option A,
    # the locked first arm). The success-conditioned length penalty (Option B) is
    # a deferred follow-up arm; do NOT enable it here.
    enable_reward_shaping: false

    # TIS variant: request + store per-token rollout logprobs from vLLM. REQUIRED
    # for trainer.algorithm.use_tis (the trainer asserts non-null rollout_logprobs).
    collect_rollout_details: true

    # RLOO-N error classification
    enable_error_classification: true
    mask_exceptions:
      - DaytonaError
      - EnvironmentStartTimeoutError
      - NetworkError
      - ConnectionError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - AgentEnvironmentTimeoutError
      - ContextLengthExceededError
    default_error_treatment: zero
    # AgentTimeoutError stays PASSTHROUGH (partial trajectory+reward is meaningful
    # signal). ContextLengthExceededError -> mask (see symclip base rationale).
    passthrough_exceptions:
      - AgentTimeoutError
    zero_exceptions: []

  # Model info for Harbor's hosted_vllm validation.
  # 131k context: 122880 input + 8192 output = 131072 (matches 24GPU_base_131k.yaml).
  model_info:
    max_input_tokens: 122880
    max_output_tokens: 8192

  archiving:
    enabled: false

  # Post-training trace upload to HuggingFace
  trace_upload:
    enabled: true
    repo_org: DCAgent
    episodes: last
    dataset_type: SFT
    cleanup: true

# Trainer configuration
trainer:
  strategy: fsdp2
  algorithm:
    advantage_estimator: rloo_n
    use_kl_loss: false
    kl_loss_coef: 0.0
    # SYMMETRIC clip 0.2/0.2 — the hero-run edge (upper-tail headroom to ramp the
    # edit->test->iterate loop). From 56GPU_seqnorm_tis_untrunc_symclip.yaml.
    eps_clip_low: 0.2
    eps_clip_high: 0.2
    # RLOO-n sequence-level-normalized objective (length-unbiased global normalizer).
    loss_reduction: seq_mean_token_sum_norm_global
    # Truncated Importance Sampling: bounds the off-policy ratio at cap=2.0.
    # REQUIRES collect_rollout_details=true (harbor block above).
    use_tis: true
    tis_imp_ratio_cap: 2.0

  # YARN RoPE scaling: extend native 40960 context to 131k. GLM-4.7-swesmith is a
  # Qwen3-8B with NATIVE max_position_embeddings=40960 and NO baked-in rope_scaling
  # (verified config.json), so the correct YaRN is factor 3.2 (40960 * 3.2 = 131072),
  # mirroring the proven #232 pattern (64GPU_qwen3_30b_a3b_longctx131k_cp_dcp.yaml).
  # The earlier 4.0/32768 (inherited from 24GPU_base_131k.yaml) mismatched the model's
  # actual native 40960 -> vLLM derived max_model_len=40960 and rejected 131072 at the
  # ModelConfig gate (job 912742/743 fail-loop). Mirrored in vLLM hf_overrides below.
  rope_scaling:
    rope_type: yarn
    factor: 3.2
    original_max_position_embeddings: 40960

  # Training loop settings
  epochs: 2
  # SMOKE: <=2 steps to probe fit + first GRPO step + GLM-prior coherence. Bump to
  # the full horizon (e.g. 80) for the full pure-solve arm once the smoke is green.
  max_steps: 2
  update_epochs_per_batch: 1

  # Batch sizes
  train_batch_size: 64
  policy_mini_batch_size: 64
  eval_batch_size: 64

  # Micro batch sizes (micro1x4 variant)
  micro_forward_batch_size_per_gpu: 4
  micro_train_batch_size_per_gpu: 1

  max_prompt_length: 999999

  # Evaluation and checkpointing
  eval_interval: 999999
  eval_before_train: false
  # SMOKE: checkpoint every step to bank progress (131k is slow; chain restarts expected).
  ckpt_interval: 1
  resume_mode: latest
  hf_save_interval: 5
  hf_hub_repo_id: null
  hf_hub_private: false
  hf_hub_revision: main

  # Database registration — OFF (manual register only; launcher also auto-injects false).
  enable_db_registration: false

  # Logging
  project_name: OpenThoughts-Agent
  log_level: INFO
  tracker_commit_each_step: true
  logger: console

  # Paths
  run_name: null
  ckpt_path: null
  export_path: null

  policy:
    optimizer_config:
      lr: 8e-6
      weight_decay: 0.0
      adam_betas: [0.9, 0.999]
      max_grad_norm: 0.9
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: true
      fsdp_size: 4
  ref:
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: true
      fsdp_size: 4

  placement:
    colocate_all: false
    policy_num_nodes: 2
    ref_num_nodes: 2
    policy_num_gpus_per_node: 4
    ref_num_gpus_per_node: 4

  fully_async:
    max_staleness_steps: 16
    num_parallel_generation_workers: 96

generator:
  backend: vllm
  timeout_multiplier: 1.0
  model_dtype: bfloat16

  inference_engine_tensor_parallel_size: 1
  # 16 inference engines (24 total GPUs: 16 engines + 8 policy/ref shared)
  num_inference_engines: 16

  n_samples_per_prompt: 8
  eval_n_samples_per_prompt: 8

  gpu_memory_utilization: 0.75

  max_num_seqs: 24
  max_num_batched_tokens: 65536

  enable_prefix_caching: true
  enable_chunked_prefill: true

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true
  enable_ray_prometheus_stats: false
  vllm_stats_interval: 1
  append_eos_token_after_stop_str_in_multi_turn: true
  max_turns: 999999

  sampling_params:
    # 131k output budget (matches 24GPU_base_131k.yaml's 8192).
    max_generate_length: 8192
    # UNTRUNC sampling (the judge-winner @70%): temp 1.0, top_p 1.0, top_k -1.
    temperature: 1.0
    top_p: 1.0
    top_k: -1

  engine_init_kwargs:
    max_model_len: 131072
    # Interleaved thinking chat template: preserves <think> blocks on ALL
    # historical assistant turns (stock Qwen3 template strips them).
    custom_chat_template_chat_completion_path: chat_templates/qwen3_thinking_acc.jinja2
    # YARN RoPE scaling override for vLLM inference engines (must agree with the
    # trainer rope_scaling above; mismatched YaRN SFT<->RL is a silent correctness bug).
    # factor 3.2 / original 40960 = model's native max_position_embeddings, so vLLM
    # derives max_model_len = 40960 * 3.2 = 131072 and the ModelConfig gate accepts the
    # 131072 request natively (no VLLM_ALLOW_LONG_MAX_MODEL_LEN needed — same as #232).
    hf_overrides:
      rope_scaling:
        rope_type: yarn
        factor: 3.2
        original_max_position_embeddings: 40960

data:
  train_data: []
  val_data: ["open-thoughts/OpenThoughts-TB-dev"]
