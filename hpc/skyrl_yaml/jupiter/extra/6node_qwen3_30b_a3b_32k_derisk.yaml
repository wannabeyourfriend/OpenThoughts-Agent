# =============================================================================
# Qwen3-30B-A3B — MINIMAL DE-RISK RL config for Jupiter (GH200 96GB, 4 GPU/node)
# =============================================================================
# Target: Qwen/Qwen3-30B-A3B  (task #232 de-risk — the SIMPLEST viable variant
#   that should train to global_step 1, so we can pin which of #232's exotic
#   features (131k YaRN ctx / CP=2 ring-SDPA / R3 routed-experts capture) the
#   silent generation-rollout hang actually needs.)
#
# WHY THIS CONFIG EXISTS (the de-risk strategy):
#   #232 (full config: extra/64GPU_qwen3_30b_a3b_longctx131k_cp_dcp.yaml) has
#   peeled ~8 distinct stalls. The latest = a silent generation-rollout hang that
#   survives the placement + custom-AR fixes: the run reaches the first generation
#   rollout (`Generation Buffer 0/64`), then silently freezes with NO count-607744
#   / execute_model / shm signature. #217 (Qwen3-Coder-30B-A3B, job 913908) PROVES
#   that 30B-A3B agentic RL trains fine at standard ctx WITHOUT CP / long-ctx / R3
#   — so the #232-specific risk is the **131k + CP + R3** stack, not the MoE /
#   agentic base. This config STRIPS those three axes to the simplest baseline:
#     * ctx 131k -> 32k           (32768 < native 40960 -> NO YaRN rope_scaling)
#     * CP=2 ring_sdpa -> CP=1    (no context-parallel; 32k fits without it)
#     * DCP=1                     (already minimal in #232 Option B)
#     * R3 capture OFF            (enable_return_routed_experts=false +
#                                  moe_router_replay=false)
#   KEPT from #232's banked fixes:
#     * disable_custom_all_reduce=true  (harmless belt-and-suspenders; inert at
#                                        TP=2 on-node but kept for parity)
#   NOT NEEDED at this rung (documented for the re-add ladder):
#     * placement fix SkyRL e5f0ff5 — fixes a CROSS-NODE TP=4 split. This config
#       runs TP=2 = HALF a 4-GPU node per engine (2 engines/node), so the TP
#       all-reduce is ALWAYS on-node NVLink by construction; the placement bug it
#       fixes cannot occur here. (NOTE: the fix IS live in #232's runs — SkyRL
#       loads from the HOST clone OpenThoughts-Agent/SkyRL @ e5f0ff5 via PYTHONPATH,
#       which shadows the SIF's older baked /opt/SkyRL @ 34c348b. Just moot HERE
#       because TP=2 cannot split cross-node.)
#     * _cp_fixb2.sif — that SIF exists for the CP/R3 path. The minimal baseline
#       uses #217's PROVEN runtime (skyrl_megatron_vllm0202rc0_r3.sif + titan
#       overlay), which is the KNOWN-GOOD train-to-gs1 path for plain qwen3_moe at
#       32k/CP1/R3-off. (The _cp_fixb2.sif is reintroduced at the CP/R3 rungs.)
#
# This is DIRECTLY ADAPTED from the PROVEN 24GPU_qwen3_coder_30b_a3b.yaml (#217),
# changing only: model_path (Coder-Instruct -> base Qwen3-30B-A3B). Same arch
# (qwen3_moe, 48 layers, hidden 2048, 32/4 GQA heads, head_dim 128, 128 experts
# top-8, moe_intermediate 768, NO shared expert), so the FSDP/EP/vLLM sizing is
# byte-identical. The base Qwen3-30B-A3B is a thinking model (interleaved_thinking
# + the qwen3_thinking_acc template apply), native ctx 40960 (vs Coder's 262144) —
# fine at 32k.
#
# Launch via the standard path:
#
#   python -m hpc.launch \
#     --job_type rl \
#     --rl_config ./hpc/skyrl_yaml/jupiter/extra/6node_qwen3_30b_a3b_32k_derisk.yaml \
#     --model_path Qwen/Qwen3-30B-A3B \
#     --num_nodes 6 \
#     --train_data '["DCAgent/exp_rpt_pymethods2test-large"]' \
#     --time_limit 11:59:00 \
#     --max_restarts 5 \
#     --reservation reformo \
#     --experiments_dir /e/data1/datasets/playground/ot-baf \
#     --job_name rl_30b_a3b_32k_derisk
#
# -----------------------------------------------------------------------------
# GPU / NODE SIZING (6 nodes × 4 GH200 = 24 GPUs)  [colocate_all: false]
# -----------------------------------------------------------------------------
# Generation (vLLM):  4 engines × TP=2            = 8 GPUs  =  2 nodes
# Policy/Ref FSDP  :  4 nodes × 4 (EP=4 × FSDP=4) = 16 GPUs =  4 nodes
#                                                   -------    --------
#                                          TOTAL =  24 GPUs    6 nodes
#
# DIVISIBILITY CHECKS (all hard constraints — verified, same as #217):
#   * MoE expert sharding: 128 experts / EP=4 = 32 experts/EP-rank;
#     FSDP=4 must divide 32 → 32/4 = 8 experts/FSDP-rank ✓
#   * EP × FSDP = 4 × 4 = 16 = policy GPUs ✓
#   * vLLM TP=2 divides 32 attn heads (16/GPU) AND 4 KV heads (2 KV/rank → valid
#     GQA) AND 128 experts (64/GPU) ✓   (TP=2 = 2 engines per 4-GPU node → the
#     decode TP all-reduce is ON-NODE NVLink; no cross-node split possible.)
#
# FSDP memory arithmetic (30B, full-fidelity Adam, bf16-mixed):
#   ~540 GB sharded state / 16 GPUs → ~34 GB/GPU. cpu_offload: true moves
#   params+optimizer into the GH200 coherent LPDDR (480 GB/node), leaving HBM for
#   the active shard + 32k-context activations → comfortable.
# =============================================================================

entrypoint: examples.terminal_bench.entrypoints.main_tbench

# Hydra config groups (+ prefix in CLI)
config_groups:
  terminal_bench_config: terminal_bench

# Terminal bench / agentic environment settings
terminal_bench:
  trials_dir: null

  harbor:
    name: terminus-2
    max_episodes: 999999
    enable_summarize: false
    store_all_messages: true
    trajectory_config:
      raw_content: true
    enable_episode_logging: false
    record_terminal_session: false
    enable_pane_logging: false

    strict_json_parser: true

    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    override_timeout_sec: 1800

    override_cpus: 1
    override_memory_mb: 2048
    override_storage_mb: 2048

    auto_snapshot: true

    verifier_override_timeout_sec: 120

    max_retries: 3
    min_wait_sec: 60.0
    max_wait_sec: 600.0
    wait_multiplier: 2.0

    exclude_exceptions:
      - VerifierTimeoutError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError
      - VerifierRuntimeError

    # 300 concurrent trials — the no-R3-capture value (R3 capture is OFF here, so
    # no routed_experts arrays held resident → the original 300 is safe and keeps
    # the async buffer full across the 4 TP=2 engines).
    n_concurrent_trials: 300

    log_level: INFO

    enable_reward_shaping: false

    # collect_rollout_details=true → per-token rollout logprobs from vLLM, REQUIRED
    # for use_tis below (trainer asserts non-null rollout_logprobs when use_tis).
    collect_rollout_details: true

    enable_error_classification: true
    mask_exceptions:
      - DaytonaError
      - EnvironmentStartTimeoutError
      - NetworkError
      - ConnectionError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - AgentEnvironmentTimeoutError
    default_error_treatment: zero
    passthrough_exceptions:
      - AgentTimeoutError
      - ContextLengthExceededError

  # 768-token buffer below max_model_len=32768 (matches #217 / 56GPU_base).
  model_info:
    max_input_tokens: 32767
    max_output_tokens: 4096

  archiving:
    enabled: false

  trace_upload:
    enabled: true
    repo_org: DCAgent
    episodes: last
    dataset_type: SFT
    cleanup: true

# =============================================================================
# Trainer configuration
# =============================================================================
trainer:
  strategy: fsdp2
  # Gradient checkpointing ON at 32k (cheap insurance on the activation peak even
  # for a 30B). use_reentrant=false is the recompute-safe variant.
  gradient_checkpointing: true
  gradient_checkpointing_use_reentrant: false
  algorithm:
    advantage_estimator: rloo_n
    use_kl_loss: false
    kl_loss_coef: 0.0
    eps_clip_low: 0.2
    eps_clip_high: 0.05
    # seqnorm baseline (matches #217): global length-unbiased + grad-accum-correct.
    loss_reduction: seq_mean_token_sum_norm_global
    # Truncated Importance Sampling ON — bounds the vLLM↔FSDP rollout-vs-train gap
    # (R3 router-replay is OFF, so TIS is the correction lever). REQUIRES
    # collect_rollout_details=true (above). cap=2.0 = standard truncation.
    use_tis: true
    tis_imp_ratio_cap: 2.0

  epochs: 2
  max_steps: 80
  update_epochs_per_batch: 1

  train_batch_size: 64
  policy_mini_batch_size: 64
  eval_batch_size: 64

  # micro_forward 4 (forward-only logprob pass), micro_train 1 (MoE backward spike).
  micro_forward_batch_size_per_gpu: 4
  micro_train_batch_size_per_gpu: 1

  max_prompt_length: 999999

  eval_interval: 999999
  eval_before_train: false
  # ckpt_interval=1: de-risk run — bank step-1 IMMEDIATELY so reaching gs1 is
  # durable (the whole point of this run is the gs1 GATE; don't risk a wall-timeout
  # losing the proof). 30B/32k steps are fast, so every-1 is cheap.
  ckpt_interval: 1
  resume_mode: latest
  hf_save_interval: 5
  hf_hub_repo_id: null
  hf_hub_private: false
  hf_hub_revision: main

  enable_db_registration: false

  project_name: OpenThoughts-Agent
  log_level: INFO
  tracker_commit_each_step: true
  logger: console

  run_name: null
  ckpt_path: null
  export_path: null

  # Policy optimizer — a3 production hparams (lr 8e-6, max_grad_norm 0.9).
  policy:
    optimizer_config:
      lr: 8e-6
      weight_decay: 0.0
      adam_betas: [0.9, 0.999]
      max_grad_norm: 0.9
    fsdp_config:
      cpu_offload: true
      reshard_after_forward: true
      # EP=4 × FSDP=4 = 16 policy GPUs (4 nodes). 128 experts / EP=4 = 32/EP-rank;
      # FSDP=4 divides 32 (8 experts/FSDP-rank). NO context_parallel axis (CP=1 =
      # the de-risk strip): no context_parallel_size / cp_style keys → the FSDP2
      # mesh is EP × FSDP only, the simplest MoE training mesh. moe_grouped_gemm ON
      # (only the grouped weight-sync path produces vLLM-loadable expert names).
      fsdp_size: 4
      expert_model_parallel_size: 4
      moe_router_replay: false
      moe_grouped_gemm: true
      ep_comm_backend: torch
  ref:
    # INERT (use_kl_loss=false → no RefWorker built). Mirror for config-consistency.
    model:
      path: Qwen/Qwen3-30B-A3B
    fsdp_config:
      cpu_offload: true
      reshard_after_forward: true
      fsdp_size: 4
      expert_model_parallel_size: 4
      moe_router_replay: false
      moe_grouped_gemm: true
      ep_comm_backend: torch

  # Disaggregated placement: policy+ref share 4 nodes / 16 GPUs (FSDP), the 2
  # generation nodes (4 TP=2 engines) are allocated separately.
  placement:
    colocate_all: false
    policy_num_nodes: 4
    ref_num_nodes: 4
    policy_num_gpus_per_node: 4
    ref_num_gpus_per_node: 4
    # Reserve the 4 policy nodes (STRICT_SPREAD) BEFORE the vLLM PG is created so
    # policy claims its nodes first and the 4 TP=2 engines land on the disjoint 2.
    policy_strict_spread_pg: true
    # One {GPU:1,CPU:1} bundle PER policy GPU → each actor pins to a distinct GPU
    # (avoids GPU-0-stacking init-OOM in the EP layout).
    policy_per_gpu_bundles: true
    policy_force_cvd_mask: true

  fully_async:
    max_staleness_steps: 16
    num_parallel_generation_workers: 256

# =============================================================================
# Generator configuration (vLLM)
# =============================================================================
generator:
  backend: vllm
  timeout_multiplier: 1.0
  model_dtype: bfloat16

  # TP=2 per engine: 32 attn heads / 2 = 16/GPU; 4 KV heads / 2 = 2/rank (valid
  # GQA); 128 experts / 2 = 64/GPU. 4 engines × TP=2 = 8 GPUs = 2 nodes (2
  # engines/node → the decode TP all-reduce stays ON-NODE NVLink by construction).
  inference_engine_tensor_parallel_size: 2
  # 4 TP=2 engines = 8 inference GPUs = 2 nodes. Set EXPLICITLY (not null): the
  # launcher's (num_nodes*gpus)//tp = 6*4//2 = 12 derivation would be WRONG (4 of
  # the 6 nodes are policy-only).
  num_inference_engines: 4

  inference_engine_expert_parallel_size: 1

  # mp (multiprocessing) executor backend — no Ray Compiled-DAG. R3 is OFF here so
  # the DAG-deadlock path is irrelevant; mp is the robust default for plain
  # qwen3_moe. Requires colocate_all=false (set above).
  inference_engine_mp_backend: true

  n_samples_per_prompt: 8
  eval_n_samples_per_prompt: 8

  gpu_memory_utilization: 0.85

  max_num_seqs: 24
  max_num_batched_tokens: 16384

  enable_prefix_caching: true
  enable_chunked_prefill: true

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true
  enable_ray_prometheus_stats: false
  vllm_stats_interval: 1
  append_eos_token_after_stop_str_in_multi_turn: true
  max_turns: 999999

  sampling_params:
    max_generate_length: 4096
    temperature: 0.7
    top_p: 0.95
    top_k: 20

  engine_init_kwargs:
    # 32768 — WELL WITHIN the base Qwen3-30B-A3B native context (40960), so NO YaRN
    # rope_scaling is needed (the #232 131k run needed YaRN factor 3.2; stripped here).
    max_model_len: 32768
    # qwen3_thinking_acc jinja2 — the base Qwen3-30B-A3B is a standard Qwen3 thinking
    # model. Leading ./ is load-bearing (file-path classification → absolute path).
    custom_chat_template_chat_completion_path: ./chat_templates/qwen3_thinking_acc.jinja2
    # R3 routed_experts capture OFF (paired with fsdp_config.moe_router_replay=false).
    # This is the de-risk strip: TIS handles the rollout-vs-train correction. Flip
    # BOTH to true together at the R3 rung of the re-add ladder.
    enable_return_routed_experts: false
    # #232 banked fix, KEPT as harmless belt-and-suspenders parity. On GH200 full-
    # NVLink this disables vLLM's watchdog-less device-side custom-AR spin-barrier
    # (the #232 weight-sync deadlock suspect). INERT at TP=2 on-node (the custom-AR
    # is already auto-disabled / the all-reduce is tiny on-node), but kept so the
    # baseline matches #232's banked-fix surface exactly.
    disable_custom_all_reduce: true

# Data paths
data:
  train_data: []
  val_data: []

# K-actor rollout fan-out — ON (breaks the single-event-loop GIL ceiling).
rollout:
  fanout:
    enabled: true
    num_coordinators: 4
    cpus_per_coordinator: 8

# =============================================================================
# Apptainer runtime container
# =============================================================================
# #217's PROVEN runtime: torch-2.11 / vLLM-0.20.2rc0 SIF + torchtitan-0.2.2 overlay.
# This is the KNOWN-GOOD train-to-gs1 path for plain qwen3_moe at 32k/CP1/R3-off
# (job 913908 / #217 has run cleanly for 6h+ on it). The _cp_fixb2.sif (CP/R3
# baked) is DELIBERATELY NOT used here — it exists for the CP/R3 rungs of the
# re-add ladder; the minimal baseline must use the simplest proven image. The
# three torch-2.11 multi-node env fixes (FlashInfer-sampler off, Triton libcuda
# stub, NCCL P2P_DISABLE) are REQUIRED on this SIF and live in extra_env below.
container:
  sif: /e/scratch/jureap59/feuer1/containers/skyrl_megatron_vllm0202rc0_r3.sif
  overlays:
    - /e/scratch/jureap59/feuer1/containers/skyrl_titan_overlay.img
  binds:
    - /e/scratch
    - /e/data1
    # R3-capture single-file binds OMITTED (would shadow /opt/vllm_build/vllm on
    # this SIF → import failure; R3 is OFF here anyway).
  pydeps: /e/scratch/jureap59/feuer1/sif_pydeps
  extra_env:
    SKYRL_GDN_MASK_FLA: 1
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    APPTAINERENV_PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    # --- vLLM 0.20.2rc0 SIF env fixes (REQUIRED on this SIF, not model-specific) ---
    VLLM_USE_FLASHINFER_SAMPLER: 0
    VLLM_ATTENTION_BACKEND: FLASH_ATTN
    TRITON_LIBCUDA_PATH: /.singularity.d/libs
    APPTAINERENV_VLLM_USE_FLASHINFER_SAMPLER: 0
    APPTAINERENV_VLLM_ATTENTION_BACKEND: FLASH_ATTN
    APPTAINERENV_TRITON_LIBCUDA_PATH: /.singularity.d/libs
    # --- Cross-node NCCL fix for the 0.20.2rc0 SIF (P2P_DISABLE required; root-
    # caused on the Mixtral run). Correctness-safe; config-local (this SIF only). ---
    NCCL_COLLNET_ENABLE: 0
    NCCL_NVLS_ENABLE: 0
    NCCL_P2P_DISABLE: 1
    NCCL_DEBUG: INFO
    APPTAINERENV_NCCL_COLLNET_ENABLE: 0
    APPTAINERENV_NCCL_NVLS_ENABLE: 0
    APPTAINERENV_NCCL_P2P_DISABLE: 1
    APPTAINERENV_NCCL_DEBUG: INFO
    # --- HF offline on compute nodes (model pre-staged to HF cache) ---
    HF_HUB_OFFLINE: 1
    TRANSFORMERS_OFFLINE: 1
    APPTAINERENV_HF_HUB_OFFLINE: 1
    APPTAINERENV_TRANSFORMERS_OFFLINE: 1
