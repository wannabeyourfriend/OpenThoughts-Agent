# =============================================================================
# Qwen3-Coder-30B-A3B-Instruct — CP + DCP + R3 @ 131k INIT-SMOKE (FAST)
# =============================================================================
# PURPOSE: a fast init-validation variant of the production
#   16node_qwen3_30b_a3b_131k_cp_dcp_r3.yaml whose ONLY job is to exercise the
#   FULL mesh + DCP + R3 init at 131k WITHOUT waiting for a slow 131k training step:
#     * the EP8 x FSDP2 x CP2 = 32 policy-GPU FSDP mesh builds at 131k,
#     * the 4 x TP8 x DCP2 vLLM engines bind (incl. the cross-node-TP decode geometry),
#     * R3 routed-experts capture initializes (the #237 rank-symmetric epilogue),
#     * the DCP=2 KV-cache sharding + R3+DCP guard-lift coexist at engine bind.
#   We want a CLEAN engine + mesh + DCP + R3 init, NOT a full training step (131k
#   steps take hours). Monitor ~30 min for the bind/init, not gs1.
#
# This is an INIT/CODE-VALIDATION SMOKE — NOT a controlled-ablation arm. Not for DB/HF.
#
# KEPT UNCHANGED from production (these EXERCISE the three axes + the mesh):
#   * Model Qwen3-Coder-30B-A3B-Instruct, max_model_len 131072 / NO YaRN.
#   * The ENTIRE policy+ref CP path: EP8 x FSDP2 x CP2 = 32 policy GPU, ring_sdpa,
#     allgather, attn_backend=sdpa, flash_attn=false, use_sample_packing=false,
#     gradient_checkpointing=true.
#   * R3 ON: enable_return_routed_experts=true, moe_router_replay=true, R3 transport env.
#   * DCP=2 ON: inference_engine_decode_context_parallel_size=2, TP=8, RAY executor,
#     async_scheduling=false, VLLM_ALLOW_ROUTED_EXPERTS_DCP=1.
#   * 16 nodes / 64 GPU placement (8 policy + 8 vLLM), fixb3 SIF + all extra_env.
#
# MADE FAST (rollout + step count only — the init/mesh/DCP/R3 code is unaffected):
#   * train_batch_size 64 -> 32, policy_mini_batch_size 64 -> 32, eval_batch_size 32.
#     policy_dp_size here = policy_world_size 32 (CP shards the seq dim, EPxFSDP tile the
#     32 policy GPUs). The CP2 SMOKE chain proved three coupled constraints (all in
#     validate_batch_sizes / fully_async): fully-async asserts train==mini; train_batch_
#     size >= lcm(DP sizes) = policy_dp_size; mini*n_samples//dp > 0 and train%mini==0.
#     UNIQUE smallest clearing all three at dp=32 = 32: train==mini==32, 32>=32, 32%32==0,
#     mini_per_gpu = 32*2//32 = 2 (>0, %micro_train(1)==0).
#   * n_samples_per_prompt 8 -> 2  => 16 prompts x 2 = 32 episodes/step.
#   * sampling_params.max_generate_length 16384 -> 2048 (shorter episodes; KEEPS 131k
#     max_model_len so the KV-cache/DCP sizing at 131k still binds).
#   * generator.max_turns 999999 -> 6 (cap agent turns so episodes end fast).
#   * harbor.override_timeout_sec 1800 -> 600, n_concurrent_trials 150 -> 32.
#   * trace_upload.enabled true -> false.
#   * max_steps 80 -> 2, ckpt_interval 1 -> 999 (no checkpoint saves).
#   * hf_save_interval 5 -> 999, hf_hub_repo_id null, db_reg false.
#
# Launch (KEEP 131k + cp + dcp + r3; fast):
#   python -m hpc.launch --job_type rl \
#     --rl_config ./hpc/skyrl_yaml/jupiter/extra/16node_qwen3_30b_a3b_131k_cp_dcp_r3_SMOKE.yaml \
#     --model_path Qwen/Qwen3-Coder-30B-A3B-Instruct \
#     --num_nodes 16 --train_data '["DCAgent/exp_rpt_pymethods2test-large"]' \
#     --time_limit 02:00:00 --reservation reformo \
#     --experiments_dir /e/data1/datasets/playground/ot-baf \
#     --job_name rl_30b_a3b_131k_cpdcpr3_SMOKE
# =============================================================================

entrypoint: examples.terminal_bench.entrypoints.main_tbench

config_groups:
  terminal_bench_config: terminal_bench

terminal_bench:
  trials_dir: null

  harbor:
    name: terminus-2
    max_episodes: 999999
    enable_summarize: false
    store_all_messages: true
    trajectory_config:
      raw_content: true
    enable_episode_logging: false
    record_terminal_session: false
    enable_pane_logging: false

    strict_json_parser: true

    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    # SMOKE: shorter sandbox timeout.
    override_timeout_sec: 600

    override_cpus: 1
    override_memory_mb: 2048
    override_storage_mb: 2048

    auto_snapshot: true

    verifier_override_timeout_sec: 120

    max_retries: 3
    min_wait_sec: 60.0
    max_wait_sec: 600.0
    wait_multiplier: 2.0

    exclude_exceptions:
      - VerifierTimeoutError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError
      - VerifierRuntimeError

    # SMOKE: 32 episodes/step fit in one concurrency wave.
    n_concurrent_trials: 32

    log_level: INFO

    enable_reward_shaping: false

    collect_rollout_details: true

    enable_error_classification: true
    mask_exceptions:
      - DaytonaError
      - EnvironmentStartTimeoutError
      - NetworkError
      - ConnectionError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - AgentEnvironmentTimeoutError
    default_error_treatment: zero
    passthrough_exceptions:
      - AgentTimeoutError
      - ContextLengthExceededError

  # KEEP 131k length budget so the KV/DCP sizing at 131k still binds.
  model_info:
    max_input_tokens: 130000
    max_output_tokens: 16384

  archiving:
    enabled: false

  # SMOKE: no trace export.
  trace_upload:
    enabled: false
    repo_org: DCAgent
    episodes: last
    dataset_type: SFT
    cleanup: true

# =============================================================================
# Trainer configuration  (CP path + 131k UNCHANGED from production)
# =============================================================================
trainer:
  strategy: fsdp2
  attn_backend: sdpa
  flash_attn: false
  gradient_checkpointing: true
  gradient_checkpointing_use_reentrant: false
  algorithm:
    advantage_estimator: rloo_n
    use_kl_loss: false
    kl_loss_coef: 0.0
    eps_clip_low: 0.2
    eps_clip_high: 0.05
    loss_reduction: seq_mean_token_sum_norm_global
    use_tis: true
    tis_imp_ratio_cap: 2.0

  epochs: 2
  # SMOKE: 2 steps is enough to validate init + first forward through the full mesh.
  max_steps: 2
  update_epochs_per_batch: 1

  # SMOKE: train==mini==32 (policy_dp_size=32; see header for the three coupled
  # batch-size constraints the CP2 SMOKE chain proved).
  train_batch_size: 32
  policy_mini_batch_size: 32
  eval_batch_size: 32

  # micro sizes UNCHANGED (these drive the per-GPU CP forward shapes at 131k).
  micro_forward_batch_size_per_gpu: 2
  micro_train_batch_size_per_gpu: 1

  max_prompt_length: 999999

  use_sample_packing: false

  eval_interval: 999999
  eval_before_train: false
  # SMOKE: no checkpoint saves — we only need to OBSERVE clean init.
  ckpt_interval: 999
  resume_mode: latest
  hf_save_interval: 999
  hf_hub_repo_id: null
  hf_hub_private: false
  hf_hub_revision: main

  enable_db_registration: false

  project_name: OpenThoughts-Agent
  log_level: INFO
  tracker_commit_each_step: true
  logger: console

  run_name: null
  ckpt_path: null
  export_path: null

  policy:
    optimizer_config:
      lr: 8e-6
      weight_decay: 0.0
      adam_betas: [0.9, 0.999]
      max_grad_norm: 0.9
    fsdp_config:
      cpu_offload: true
      reshard_after_forward: true
      fsdp_size: 2
      expert_model_parallel_size: 8
      context_parallel_size: 2
      cp_style: ring_sdpa
      cp_rotate_method: allgather
      moe_router_replay: true
      moe_grouped_gemm: true
      ep_comm_backend: torch
  ref:
    model:
      path: Qwen/Qwen3-Coder-30B-A3B-Instruct
    fsdp_config:
      cpu_offload: true
      reshard_after_forward: true
      fsdp_size: 2
      expert_model_parallel_size: 8
      context_parallel_size: 2
      cp_style: ring_sdpa
      cp_rotate_method: allgather
      moe_router_replay: true
      moe_grouped_gemm: true
      ep_comm_backend: torch

  placement:
    colocate_all: false
    policy_num_nodes: 8
    ref_num_nodes: 8
    policy_num_gpus_per_node: 4
    ref_num_gpus_per_node: 4
    policy_strict_spread_pg: true
    policy_per_gpu_bundles: true
    policy_force_cvd_mask: true

  fully_async:
    max_staleness_steps: 16
    num_parallel_generation_workers: 256

# =============================================================================
# Generator configuration (vLLM)  — engines UNCHANGED (DCP=2/TP=8); sampling shrunk.
# =============================================================================
generator:
  backend: vllm
  timeout_multiplier: 1.0
  model_dtype: bfloat16

  inference_engine_tensor_parallel_size: 8
  num_inference_engines: 4

  inference_engine_expert_parallel_size: 1

  inference_engine_decode_context_parallel_size: 2

  inference_engine_mp_backend: false

  # SMOKE: 2 samples/prompt x 16 prompts = 32 episodes/step.
  n_samples_per_prompt: 2
  eval_n_samples_per_prompt: 2

  gpu_memory_utilization: 0.80

  max_num_seqs: 16
  max_num_batched_tokens: 16384

  enable_prefix_caching: true
  enable_chunked_prefill: true

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true
  enable_ray_prometheus_stats: false
  vllm_stats_interval: 1
  append_eos_token_after_stop_str_in_multi_turn: true
  # SMOKE: cap agent turns so episodes terminate quickly.
  max_turns: 6

  sampling_params:
    # SMOKE: short generations (KEEPS 131k max_model_len so KV/DCP sizing still binds).
    max_generate_length: 2048
    temperature: 0.7
    top_p: 0.95
    top_k: 20

  engine_init_kwargs:
    max_model_len: 131072
    custom_chat_template_chat_completion_path: ./chat_templates/qwen3_thinking_acc.jinja2
    disable_custom_all_reduce: true
    enable_return_routed_experts: true
    async_scheduling: false

# Data paths
data:
  train_data: []
  val_data: []

rollout:
  fanout:
    enabled: true
    num_coordinators: 4
    cpus_per_coordinator: 8

# =============================================================================
# Apptainer runtime container  (IDENTICAL to production — fixb3 SIF)
# =============================================================================
container:
  sif: /e/scratch/jureap59/feuer1/containers/skyrl_megatron_vllm0202rc0_r3_cp_fixb3.sif
  binds:
    - /e/scratch
    - /e/data1
  pydeps: /e/scratch/jureap59/feuer1/sif_pydeps_longctx_titan022:/e/scratch/jureap59/feuer1/sif_pydeps
  extra_env:
    SKYRL_GDN_MASK_FLA: 1
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    APPTAINERENV_PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    VLLM_USE_FLASHINFER_SAMPLER: 0
    VLLM_ATTENTION_BACKEND: FLASH_ATTN
    TRITON_LIBCUDA_PATH: /.singularity.d/libs
    APPTAINERENV_VLLM_USE_FLASHINFER_SAMPLER: 0
    APPTAINERENV_VLLM_ATTENTION_BACKEND: FLASH_ATTN
    APPTAINERENV_TRITON_LIBCUDA_PATH: /.singularity.d/libs
    LIBRARY_PATH: /.singularity.d/libs
    APPTAINERENV_LIBRARY_PATH: /.singularity.d/libs
    NCCL_COLLNET_ENABLE: 0
    NCCL_NVLS_ENABLE: 0
    NCCL_P2P_DISABLE: 1
    NCCL_DEBUG: INFO
    APPTAINERENV_NCCL_COLLNET_ENABLE: 0
    APPTAINERENV_NCCL_NVLS_ENABLE: 0
    APPTAINERENV_NCCL_P2P_DISABLE: 1
    APPTAINERENV_NCCL_DEBUG: INFO
    VLLM_ALLOW_ROUTED_EXPERTS_DCP: 1
    APPTAINERENV_VLLM_ALLOW_ROUTED_EXPERTS_DCP: 1
    VLLM_MQ_MAX_CHUNK_BYTES_MB: 160
    APPTAINERENV_VLLM_MQ_MAX_CHUNK_BYTES_MB: 160
    VLLM_ROUTED_EXPERTS_SIDE_TIMEOUT_SECONDS: 1200
    APPTAINERENV_VLLM_ROUTED_EXPERTS_SIDE_TIMEOUT_SECONDS: 1200
    VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: 900
    APPTAINERENV_VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: 900
    TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC: 600
    APPTAINERENV_TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC: 600
    TORCH_NCCL_ENABLE_MONITORING: 1
    APPTAINERENV_TORCH_NCCL_ENABLE_MONITORING: 1
    TORCH_NCCL_DUMP_ON_TIMEOUT: 1
    APPTAINERENV_TORCH_NCCL_DUMP_ON_TIMEOUT: 1
    TORCH_FR_BUFFER_SIZE: 2000
    APPTAINERENV_TORCH_FR_BUFFER_SIZE: 2000
    TORCH_NCCL_TRACE_CPP_STACK: 1
    APPTAINERENV_TORCH_NCCL_TRACE_CPP_STACK: 1
    TORCH_NCCL_DEBUG_INFO_TEMP_FILE: /e/data1/datasets/playground/ot-baf/fr_dumps_131k_cpdcpr3/nccl_fr_rank
    APPTAINERENV_TORCH_NCCL_DEBUG_INFO_TEMP_FILE: /e/data1/datasets/playground/ot-baf/fr_dumps_131k_cpdcpr3/nccl_fr_rank
    HF_HUB_OFFLINE: 1
    TRANSFORMERS_OFFLINE: 1
    APPTAINERENV_HF_HUB_OFFLINE: 1
    APPTAINERENV_TRANSFORMERS_OFFLINE: 1
