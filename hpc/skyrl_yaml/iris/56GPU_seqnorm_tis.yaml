# =============================================================================
# Iris / CoreWeave port of the Jupiter 56-GPU seqnorm + TIS RL config.
# =============================================================================
# This is the SAME experiment as hpc/skyrl_yaml/jupiter/56GPU_seqnorm_tis.yaml
# (RLOO-N, seq_mean_token_sum_norm_global loss + Truncated Importance Sampling),
# retargeted from JSC Jupiter (GH200, 4 GPU/node) to Marin's Iris CoreWeave
# cluster cw-us-east-02a (8x H100-80GB + InfiniBand per node) via the
# rl/cloud/launch_rl_iris.py launcher and the gpu-rl container image
# (ghcr.io/open-thoughts/openthoughts-agent:gpu-rl).
#
# Topology: 7 nodes x 8 H100 = 56 GPUs.
#   - policy + ref share 8 GPUs (1 node): placement.policy_num_nodes=1,
#     ref_num_nodes=1. The launcher passes --gpus_per_node 8, so
#     build_skyrl_hydra_args FORCES policy_num_gpus_per_node / ref_num_gpus_per_node
#     to 8 (CoreWeave whole-node) regardless of the YAML — these are listed below
#     only for documentation; the effective value is 8.
#   - 48 vLLM engines x TP=1 = 48 GPUs (6 nodes).
#   - 8 (policy/ref) + 48 (engines) = 56 = 7 nodes.  colocate_all=false
#     (disaggregated policy/gen), matching the Jupiter base.
#
# What is PORTABLE and IDENTICAL to the Jupiter base (the actual experiment):
#   - The whole terminal_bench / Harbor / Daytona agentic block (timeouts, snapshot
#     caching, error classification, trace upload, model_info token caps).
#   - The trainer.algorithm seqnorm+TIS knobs: advantage_estimator rloo_n,
#     loss_reduction seq_mean_token_sum_norm_global, use_tis true,
#     tis_imp_ratio_cap 2.0, eps_clip 0.2/0.05, and collect_rollout_details true.
#   - The training-loop / batch / optimizer hyperparameters (epochs, max_steps 80,
#     train/mini/eval batch 64, micro 4/1, lr 8e-6, max_grad_norm 0.9, fsdp_size 4,
#     n_samples_per_prompt 8, sampling params, max_model_len 32768, the
#     qwen3_thinking_acc.jinja2 chat template).
#
# What CHANGED for Iris/H100 vs the GH200 base:
#   - placement.policy_num_nodes / ref_num_nodes: 2 -> 1 (8-GPU nodes, so 1 node
#     = 8 policy/ref GPUs instead of GH200's 2 nodes x 4).
#   - placement.policy_num_gpus_per_node / ref_num_gpus_per_node: 4 -> 8 (these are
#     overwritten by the launcher's --gpus_per_node 8 anyway; updated for clarity).
#   - generator.gpu_memory_utilization: 0.75 -> 0.85. The 0.75 was a Jupiter-only
#     choice (GH200 also runs hosted_vllm in-cluster, kept conservative for
#     consistency); H100-80GB has the same HBM budget as ALCC's A100-80, where 0.85
#     is the standard. Bump back down only if KV-cache pressure shows up.
#   - generator.max_num_batched_tokens: 65536 -> 16384 (the 65536 was an explicit
#     Jupiter-specific tuning; 16384 is the cross-cluster default used on the
#     A100/H100 configs).
#   - NO container: / SIF / apptainer / conda block. On Jupiter the dense FSDP2 RL
#     runtime is the host venv ($WORKDIR/envs/rl) selected by the SLURM sbatch
#     template; on Iris the gpu-rl image IS the runtime (RL venv at
#     /opt/openthoughts/envs/rl, MarinSkyRL at /opt/skyrl, workspace synced to
#     /app). The launcher + start_rl_iris_controller.py wire all of that — none of
#     it belongs in this YAML, which is cluster-agnostic SkyRL/Hydra config.
#
# Launch:
#   source /Users/benjaminfeuer/Documents/secrets.env
#   python -m rl.cloud.launch_rl_iris \
#     --rl_config hpc/skyrl_yaml/iris/56GPU_seqnorm_tis.yaml \
#     --model_path Qwen/Qwen3-8B \
#     --train_data '["<harbor-task-dataset>"]' \
#     --num-nodes 7 \
#     --rendezvous-dir s3://<bucket>/rl-iris-rdv/<run> \
#     --job-name rl-iris-56gpu-seqnorm-tis --no-wait
# =============================================================================

entrypoint: examples.terminal_bench.entrypoints.main_tbench

# Hydra config groups (+ prefix in CLI)
config_groups:
  terminal_bench_config: terminal_bench

# Terminal bench / agentic environment settings
terminal_bench:
  # Persist per-trial Harbor rollout artifacts to R2 (s3://) so they survive pod
  # GC/preempt; the cw-us-east-02a pods inject in-cluster R2 creds (iris-task-env
  # Secret), so fsspec/UPath writes here. null would resolve to an EPHEMERAL
  # pod-local path. launch_rl_iris.py --trials-dir auto overrides this per-job-name.
  trials_dir: s3://marin-na/iris/rl-56gpu-seqnorm-tis/trace_jobs

  # Harbor configuration - schema-driven mapping to TrialConfig
  harbor:
    # Agent settings
    name: terminus-2
    max_episodes: 999999
    enable_summarize: false
    store_all_messages: true
    trajectory_config:
      raw_content: true
    enable_episode_logging: false
    record_terminal_session: false
    enable_pane_logging: false

    # Strict JSON parser
    strict_json_parser: true

    # Interleaved Thinking Settings
    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    # See the Jupiter base for the 1800->900 rationale (boundary-hugging a3
    # datasets hit the agent-timeout wall; 900 ~2x the valid-group yield).
    override_timeout_sec: 900

    # Environment settings
    override_cpus: 1
    override_memory_mb: 2048
    override_storage_mb: 2048

    # ==========================================================================
    # AUTO SNAPSHOT: Reduce Daytona rate limits with hash-based snapshot caching
    # ==========================================================================
    auto_snapshot: true

    # Verifier settings
    # 120 -> 300 (2026-06-29): on cw the Daytona verifier-artifact pull
    # (environment.py:download_dir -> _sdk_download_dir) clusters at 122-136s, just
    # over the old 120s cap -> ~95% VerifierTimeoutError -> trajectories miss
    # logprobs -> "batch cannot be used for TIS" -> global_step stuck at 0. The
    # pulls COMPLETE at ~130s, so a 300s cap lets them finish and yield usable TIS
    # batches. (dense8b-32k-survive5 deep-dive, rl-job-health-deep-dive.)
    verifier_override_timeout_sec: 300

    # Retry settings
    max_retries: 3
    min_wait_sec: 60.0
    max_wait_sec: 600.0
    wait_multiplier: 2.0

    exclude_exceptions:
      - VerifierTimeoutError
      - VerifierRuntimeError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError

    # Per-job Daytona sandbox concurrency (does not affect the cross-cluster
    # RUNNING-RL cap, which is about job count). See the Jupiter base for the
    # 900->675 walk-down rationale (driver host-memory pressure on hard datasets).
    n_concurrent_trials: 675

    # Logging settings
    log_level: INFO

    # Reward shaping (disabled - binary rewards)
    enable_reward_shaping: false

    # TIS variant: request + store per-token rollout logprobs from vLLM.
    # REQUIRED for trainer.algorithm.use_tis (the trainer asserts non-null
    # rollout_logprobs when use_tis=true).
    collect_rollout_details: true

    # RLOO-N error classification
    enable_error_classification: true
    mask_exceptions:
      - DaytonaError
      - EnvironmentStartTimeoutError
      - NetworkError
      - ConnectionError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - AgentEnvironmentTimeoutError
      - ContextLengthExceededError
    default_error_treatment: zero
    # AgentTimeoutError stays PASSTHROUGH (partial trajectory+reward is meaningful
    # signal). See the Jupiter base for the refcount-race rationale that moved
    # ContextLengthExceededError into mask_exceptions.
    passthrough_exceptions:
      - AgentTimeoutError
    zero_exceptions: []

  # Model info for Harbor's hosted_vllm validation
  model_info:
    # 32000 (768-token buffer below max_model_len=32768) so harbor's litellm token
    # counter truncates before vLLM rejects an over-budget prompt. See the Jupiter
    # base for the retry-storm / FD-exhaustion rationale.
    max_input_tokens: 32000
    max_output_tokens: 4096

  archiving:
    # Enable trial archiving callback
    enabled: false

  # Post-training trace upload to HuggingFace
  trace_upload:
    enabled: true
    repo_org: DCAgent
    episodes: last
    dataset_type: SFT
    cleanup: true

# Trainer configuration
trainer:
  strategy: fsdp2
  algorithm:
    advantage_estimator: rloo_n
    use_kl_loss: false
    kl_loss_coef: 0.0
    eps_clip_low: 0.2
    eps_clip_high: 0.05
    # RLOO-n sequence-level-normalized objective. Global length-unbiased
    # normalizer Z = global_num_seqs * max_seq_len (set programmatically in the
    # driver); the yaml only carries the loss_reduction selector.
    loss_reduction: seq_mean_token_sum_norm_global
    # Truncated Importance Sampling: clamp(exp(old_log_probs - rollout_logprobs),
    # max=cap). REQUIRES collect_rollout_details=true (harbor block).
    use_tis: true
    tis_imp_ratio_cap: 2.0

  # Training loop settings
  epochs: 2
  max_steps: 80
  update_epochs_per_batch: 1

  # Batch sizes
  train_batch_size: 64
  policy_mini_batch_size: 64
  eval_batch_size: 64

  # Micro batch sizes (micro1x4 variant)
  micro_forward_batch_size_per_gpu: 4
  micro_train_batch_size_per_gpu: 1

  max_prompt_length: 999999

  # Evaluation and checkpointing
  eval_interval: 999999
  eval_before_train: false
  # Resumable checkpointing
  ckpt_interval: 2
  resume_mode: latest
  # HF upload-ready checkpoints
  hf_save_interval: 5
  # HuggingFace Hub upload (set via CLI: trainer.hf_hub_repo_id=org/repo)
  hf_hub_repo_id: null
  hf_hub_private: false
  hf_hub_revision: main

  # Database registration (auto-registers trained model to Supabase)
  enable_db_registration: false

  # Logging
  project_name: OpenThoughts-Agent
  log_level: INFO
  tracker_commit_each_step: true
  logger: wandb  # CoreWeave has egress -> log to dogml/OpenThoughts-Agent (entity via WANDB_ENTITY, defaulted by launcher)

  # Paths
  run_name: null
  ckpt_path: null
  export_path: null

  # Policy optimizer
  policy:
    optimizer_config:
      lr: 8e-6
      weight_decay: 0.0
      adam_betas: [0.9, 0.999]
      max_grad_norm: 0.9
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: true
      fsdp_size: 4
  # Reference model
  ref:
    fsdp_config:
      cpu_offload: false
      reshard_after_forward: true
      fsdp_size: 4

  # Model placement (async training).
  # Iris: policy/ref share 8 GPUs = 1 H100 node. The launcher's --gpus_per_node 8
  # overrides policy_num_gpus_per_node / ref_num_gpus_per_node to 8 (documented
  # here as 8 to match; policy_num_nodes / ref_num_nodes are honored from the YAML).
  placement:
    colocate_all: false
    policy_num_nodes: 1
    ref_num_nodes: 1
    policy_num_gpus_per_node: 8
    ref_num_gpus_per_node: 8

  # Fully async generation (settings from v2_maxconcurrent)
  fully_async:
    max_staleness_steps: 16
    # Conservatively ~1/2 of total Daytona concurrency.
    num_parallel_generation_workers: 338

# Generator configuration
generator:
  backend: vllm
  timeout_multiplier: 1.0
  model_dtype: bfloat16

  inference_engine_tensor_parallel_size: 1
  # 48 engines x TP=1 = 48 GPUs for generation; + 8 GPUs policy/ref = 56 = 7 nodes.
  num_inference_engines: 48

  n_samples_per_prompt: 8
  eval_n_samples_per_prompt: 8

  # H100-80GB: 0.85 (vs Jupiter GH200's conservative 0.75). Bump down only if
  # KV-cache pressure / fragmentation shows up.
  gpu_memory_utilization: 0.85

  max_num_seqs: 24
  # 16384 cross-cluster default (the Jupiter base used a Jupiter-specific 65536).
  max_num_batched_tokens: 16384

  enable_prefix_caching: true
  enable_chunked_prefill: true

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true
  enable_ray_prometheus_stats: false
  vllm_stats_interval: 1
  append_eos_token_after_stop_str_in_multi_turn: true
  max_turns: 999999

  sampling_params:
    max_generate_length: 4096
    temperature: 0.7
    top_p: 0.95
    top_k: 20

  engine_init_kwargs:
    max_model_len: 32768
    # Interleaved thinking chat template: preserves <think> blocks on ALL
    # historical assistant turns (stock Qwen3 template strips them). Relative path
    # resolved against the in-container repo root (/app, synced workspace).
    custom_chat_template_chat_completion_path: chat_templates/qwen3_thinking_acc.jinja2

# Data paths (set via CLI --train_data / --val_data)
data:
  train_data: []
  val_data: []
