# =============================================================================
# CANARY — MoE-RL async-dispatch DRAIN fix validation (NOT a science run)
# =============================================================================
# PURPOSE: validate "Fix 1" for the CoreWeave MoE-RL wedge (the #1 blocker — the
# 2026-06-29 FR-decoded root cause: the FSDP policy worker is a Ray ASYNC actor
# whose single event loop, still unwinding the prior weight-sync coroutine on the
# peers, never schedules the queued SYNC `forward` task -> only rank 0 enters the
# step-1 forward -> lonely barrier -> 1200s NCCL watchdog). The fix
# (MarinSkyRL, after a8446a87):
#   1. `Worker.barrier_all` — a trivial SYNC drain (cuda.synchronize + dist.barrier).
#   2. fully_async_trainer issues a `pass_through` `barrier_all` drain AFTER each
#      weight-sync RETURNS and BEFORE the next forward is dispatched, forcing every
#      peer's event loop to a known sync point so the loop is FREE when
#      `forward.remote()` arrives.
#   3. `worker.forward` logs `WORKER_FORWARD_ENTER rank=...` as its FIRST statement
#      (the diagnosis instrument). PASS = ALL FSDP shard ranks (0/8/16/24) print it
#      at step 1 and the step-1 `fwd_logprobs` completes (no watchdog). Pre-fix only
#      rank 0 would print.
#   4. `SKYRL_FWD_UNSHARD_FENCE` default flipped to "0" (the disproven fence — wrong
#      layer); this canary launches with SKYRL_FWD_UNSHARD_FENCE=0 too (extra_env).
#
# REQUIRES the fix: launch with `--skyrl-ref <MarinSkyRL HEAD with the drain fix>`
# (the baked gpu-rl image predates the fix; the launcher checks out the ref at runtime).
#
# This is a CHEAP reproduction of the bug GEOMETRY: it PRESERVES the disaggregated
# MoE arm that strands the dispatch — the fully-async trainer + FSDP policy mesh
# (EP=8 x FSDP=2 x CP=2 = 32 GPU) + EP + colocate_all=false + per-step disaggregated
# weight-sync — but MINIMIZES the rollout/context so the step-1 `fwd_logprobs`
# (the decisive forward) is reached in ~10-15 min instead of ~84:
#   * context 131072 -> 8192 (max_model_len), max generation 16384 -> 512.
#   * model_info caps 130000/16384 -> 7680/512.
#   * n_samples_per_prompt 8 -> 2; batches 64 -> 4 (train==mini for fully-async).
#   * n_concurrent_trials 32 -> 8; max_num_seqs 24 -> 8.
# The bug is geometry-general (FR-proven on the 35B EP8xFSDP4 arm); this 30B
# EP8xFSDP2xCP2 arm reproduces the SAME async-actor dispatch stranding far cheaper.
#
# Base config: hpc/skyrl_yaml/iris/8node_qwen3_30b_a3b_131k_cp_dcp2_r3.yaml
# (consult it for the full rationale of every geometry/env knob carried over).
# enable_db_registration: false (canary — never DB-registered).
#
# Launch (the SUPERVISOR pushes the fix + launches — see the journal):
#   source /Users/benjaminfeuer/Documents/secrets.env
#   python -m rl.cloud.launch_rl_iris \
#     --rl_config hpc/skyrl_yaml/iris/canary_moe_dispatchfix_8k.yaml \
#     --model_path Qwen/Qwen3-Coder-30B-A3B-Instruct \
#     --train_data '["DCAgent/exp_rpt_pymethods2test-large"]' \
#     --num-nodes 8 \
#     --skyrl-ref <MarinSkyRL HEAD with the drain fix> \
#     --rendezvous-dir s3://marin-na/iris/rl-moe-dispatchfix-canary/<run> \
#     --job-name rl-moe-dispatchfix-canary --priority interactive --max-retries 1 --cpu 48 --no-wait
# =============================================================================

entrypoint: examples.terminal_bench.entrypoints.main_tbench

config_groups:
  terminal_bench_config: terminal_bench

terminal_bench:
  trials_dir: s3://marin-na/iris/rl-moe-dispatchfix-canary/trace_jobs

  harbor:
    name: terminus-2
    max_episodes: 999999
    enable_summarize: false
    store_all_messages: true
    trajectory_config:
      raw_content: true
    enable_episode_logging: false
    record_terminal_session: false
    enable_pane_logging: false

    strict_json_parser: true

    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    override_timeout_sec: 600

    override_cpus: 1
    override_memory_mb: 2048
    override_storage_mb: 2048

    auto_snapshot: true

    verifier_override_timeout_sec: 120

    max_retries: 3
    min_wait_sec: 60.0
    max_wait_sec: 600.0
    wait_multiplier: 2.0

    exclude_exceptions:
      - VerifierTimeoutError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError
      - VerifierRuntimeError

    # Minimized 32 -> 8: only enough concurrent trials to fill the tiny mini-batch fast.
    n_concurrent_trials: 8

    log_level: INFO

    enable_reward_shaping: false

    collect_rollout_details: true

    enable_error_classification: true
    mask_exceptions:
      - DaytonaError
      - EnvironmentStartTimeoutError
      - NetworkError
      - ConnectionError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - AgentEnvironmentTimeoutError
    default_error_treatment: zero
    passthrough_exceptions:
      - AgentTimeoutError
      - ContextLengthExceededError

  # Minimized context: 7680 input (+512 headroom below max_model_len 8192) + 512 output.
  model_info:
    max_input_tokens: 7680
    max_output_tokens: 512

  archiving:
    enabled: false

  # No trace upload for a throwaway canary.
  trace_upload:
    enabled: false
    repo_org: DCAgent
    episodes: last
    dataset_type: SFT
    cleanup: true

# =============================================================================
# Trainer configuration — geometry PRESERVED (fully-async + FSDP mesh + EP + CP).
# =============================================================================
trainer:
  strategy: fsdp2
  attn_backend: sdpa
  flash_attn: false
  gradient_checkpointing: true
  gradient_checkpointing_use_reentrant: false
  algorithm:
    advantage_estimator: rloo_n
    use_kl_loss: false
    kl_loss_coef: 0.0
    eps_clip_low: 0.2
    eps_clip_high: 0.05
    loss_reduction: seq_mean_token_sum_norm_global
    use_tis: true
    tis_imp_ratio_cap: 2.0

  # Canary: a couple of steps is plenty to clear the step-1 forward + a step-2 sync.
  epochs: 1
  max_steps: 3
  update_epochs_per_batch: 1

  # Minimized batches (train == mini required by the fully-async assert).
  # SkyRL asserts policy_mini_batch_size_per_gpu = floor(mini_batch x n_samples / dp_size)
  # >= 1, and dp_size is the FULL policy world (32 here), NOT the ep/cp-reduced width.
  # So need mini_batch x n_samples(2) >= 32 -> mini_batch 16 -> 32/32 = 1 sample/rank.
  # Smallest valid batch that still reaches step-1 fwd with a tiny rollout.
  train_batch_size: 16
  policy_mini_batch_size: 16
  eval_batch_size: 16

  micro_forward_batch_size_per_gpu: 1
  micro_train_batch_size_per_gpu: 1

  max_prompt_length: 999999

  use_sample_packing: false

  eval_interval: 999999
  eval_before_train: false
  ckpt_interval: 999999
  resume_mode: latest
  hf_save_interval: 999999
  hf_hub_repo_id: null
  hf_hub_private: false
  hf_hub_revision: main

  enable_db_registration: false

  project_name: OpenThoughts-Agent
  log_level: INFO
  tracker_commit_each_step: true
  logger: wandb

  run_name: null
  ckpt_path: null
  export_path: null

  policy:
    optimizer_config:
      lr: 8e-6
      weight_decay: 0.0
      adam_betas: [0.9, 0.999]
      max_grad_norm: 0.9
    fsdp_config:
      cpu_offload: true
      reshard_after_forward: true
      # MESH PRESERVED: EP=8 x FSDP=2 x CP=2 = 32 policy GPU (4 nodes x 8).
      # MoE dim-0 guard (num_experts//ep)%fsdp==0: 128/EP8=16; 16/FSDP2=8 -> VALID.
      fsdp_size: 2
      expert_model_parallel_size: 8
      context_parallel_size: 2
      cp_style: ring_sdpa
      cp_rotate_method: allgather
      moe_router_replay: true
      moe_grouped_gemm: true
      ep_comm_backend: torch
  ref:
    model:
      path: Qwen/Qwen3-Coder-30B-A3B-Instruct
    fsdp_config:
      cpu_offload: true
      reshard_after_forward: true
      fsdp_size: 2
      expert_model_parallel_size: 8
      context_parallel_size: 2
      cp_style: ring_sdpa
      cp_rotate_method: allgather
      moe_router_replay: true
      moe_grouped_gemm: true
      ep_comm_backend: torch

  # Disaggregated placement PRESERVED (this is what strands the dispatch).
  placement:
    colocate_all: false
    policy_num_nodes: 4
    ref_num_nodes: 4
    policy_num_gpus_per_node: 8
    ref_num_gpus_per_node: 8
    policy_strict_spread_pg: true
    policy_per_gpu_bundles: true
    policy_force_cvd_mask: true

  fully_async:
    max_staleness_steps: 16
    num_parallel_generation_workers: 64

# =============================================================================
# Generator configuration (vLLM) — geometry PRESERVED (TP=8, DCP=2, RAY executor, R3).
# =============================================================================
generator:
  backend: vllm
  timeout_multiplier: 1.0
  model_dtype: bfloat16

  inference_engine_tensor_parallel_size: 8
  num_inference_engines: 4

  inference_engine_expert_parallel_size: 1

  inference_engine_decode_context_parallel_size: 2

  inference_engine_mp_backend: false

  n_samples_per_prompt: 2
  eval_n_samples_per_prompt: 2

  gpu_memory_utilization: 0.80

  # Tiny KV footprint at 8k -> plenty of decode slots; the rollout drains fast.
  max_num_seqs: 8
  max_num_batched_tokens: 8192

  enable_prefix_caching: true
  enable_chunked_prefill: true

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true
  enable_ray_prometheus_stats: false
  vllm_stats_interval: 1
  append_eos_token_after_stop_str_in_multi_turn: true
  max_turns: 999999

  sampling_params:
    max_generate_length: 512
    temperature: 0.7
    top_p: 0.95
    top_k: 20

  engine_init_kwargs:
    # Minimized context: 8192 (well within Coder-Instruct native 262144 -> NO YaRN).
    max_model_len: 8192
    custom_chat_template_chat_completion_path: chat_templates/qwen3_thinking_acc.jinja2
    disable_custom_all_reduce: true
    enable_return_routed_experts: true
    async_scheduling: false

# Data paths
data:
  train_data: []
  val_data: []

# K-actor rollout fan-out — ON (matches the prod geometry).
rollout:
  fanout:
    enabled: true
    num_coordinators: 4
    cpus_per_coordinator: 8

# =============================================================================
# Runtime env (forwarded by the launcher into every task pod — NO SIF/Apptainer).
# =============================================================================
extra_env:
  # FIX-3: the disproven forward-entry fence stays OFF for this canary (the drain is
  # the fix; the fence is the wrong layer). Belt-and-suspenders vs the code default.
  SKYRL_FWD_UNSHARD_FENCE: "0"
  # --- [EPDIAG2] diagnostic probe ARM (kept for parity with the prod arm) ---
  EPDIAG: "1"
  EPDIAG_CP: "2"
  EPDIAG_EP: "8"
  EPDIAG_SP: "1"
  # --- end [EPDIAG2] ---
  SKYRL_GDN_MASK_FLA: "1"
  # Weight-sync gather serialize — kept ON (exonerated by the FR decode but a free A/B
  # knob; the drain fix is independent of it).
  SKYRL_WEIGHT_SYNC_SERIALIZE: "1"
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  VLLM_USE_FLASHINFER_SAMPLER: "0"
  VLLM_ATTENTION_BACKEND: FLASH_ATTN
  LD_LIBRARY_PATH: /opt/openthoughts/envs/rl/lib
  NCCL_DEBUG: WARN
  VLLM_ALLOW_ROUTED_EXPERTS_DCP: "1"
  VLLM_MQ_MAX_CHUNK_BYTES_MB: "160"
  VLLM_ROUTED_EXPERTS_SIDE_TIMEOUT_SECONDS: "1200"
  VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: "900"
  SKYRL_WORKER_NCCL_TIMEOUT_IN_S: "1800"
  TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC: "1800"
  TORCH_NCCL_ENABLE_MONITORING: "1"
  TORCH_NCCL_DUMP_ON_TIMEOUT: "1"
  TORCH_FR_BUFFER_SIZE: "2000"
  TORCH_NCCL_TRACE_CPP_STACK: "1"
  TORCH_NCCL_DEBUG_INFO_TEMP_FILE: /tmp/nccl_fr_rank
