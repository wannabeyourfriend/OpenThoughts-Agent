entrypoint: examples.terminal_bench.entrypoints.main_tbench

# ==========================================================================
# Qwen3-Next-80B-A3B-Instruct production agentic RL — DISAGGREGATED.
# Ported from ALCC/56GPU_base.yaml (the a3 "hero" config; 8B reached
# r~0.74 / pass@8 0.83 over 80 steps). a3 hparams are PRESERVED verbatim
# (entrypoint, Harbor terminus-2, rloo_n, eps_clip 0.2/0.05, token_mean,
# lr 8e-6, wd 0, max_grad_norm 0.9, batch 64, mini 64, n_samples 8,
# epochs 2, max_steps 80, ckpt_interval 3, resume latest, db_reg off,
# colocate_all false, fully_async.max_staleness_steps 16).
#
# 80B swaps (from the Stage-7 capstone, jobs 596157/596282 + Stage-8):
#   model Qwen/Qwen3-Next-80B-A3B-Instruct (Jupiter HF cache)
#   expert_model_parallel_size 8, moe_router_replay true, moe_grouped_gemm
#   true, ep_comm_backend torch, gradient_checkpointing true, fsdp_size 4.
#   TRAINING = EP=8 x FSDP=4 = 32 GPUs / 8 nodes (policy + ref colocated
#   on the same 8 train nodes, non-colocated wrt inference).
#
# Engine sizing (DISAGGREGATED): start ~16 inference engines TP=4 (64 GPUs
# / 16 nodes) + 32 train GPUs (8 nodes) = ~24 nodes; calibrate toward the
# a3 6:1 ratio if the trainer is gen-bound (wait_for_generation_buffer),
# down if gen is surplus. Each engine is multi-GPU (Qwen3-Next-80B is
# 3B-active MoE; TP=4 fits + serves on GH200-96GB).
#
# Runs in skyrl_megatron_vllm.sif with BOTH overlays composed:
#   vllm_http_overlay.img (P1 routed_experts HTTP)  [:ro]
#   fla_tilelang_overlay.img (Stage-8 FlashQLA GDN) [:ro]  + the masking +
#   monkeypatch shim (see stage8_scope.md §Routing) engaged at model load.
# (Overlay mounting + the GDN shim are wired in the launch sbatch /
# runtime, NOT in this yaml.)
# ==========================================================================

# Hydra config groups (+ prefix in CLI)
config_groups:
  terminal_bench_config: terminal_bench

# Terminal bench / agentic environment settings
terminal_bench:
  trials_dir: null

  harbor:
    name: terminus-2
    max_episodes: 999999
    enable_summarize: false
    store_all_messages: true
    enable_episode_logging: false
    record_terminal_session: false
    enable_pane_logging: false

    strict_json_parser: true

    # Interleaved Thinking Settings
    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    override_timeout_sec: 1800

    override_cpus: 1
    override_memory_mb: 2048
    override_storage_mb: 2048

    auto_snapshot: true

    verifier_override_timeout_sec: 120

    max_retries: 3
    min_wait_sec: 60.0
    max_wait_sec: 600.0
    wait_multiplier: 2.0

    exclude_exceptions:
      - VerifierTimeoutError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError
      - VerifierRuntimeError

    # Daytona RL concurrency discipline: a3 (4 RUNNING) + this = 5 jobs <= 6/cluster.
    # Per-job concurrency itself is the n_concurrent_trials below; keep modest at
    # 80B (each trial holds an engine slot longer than 8B) — 300 (1x base) rather
    # than a3's 900 (3x) since gen is slower per token and engines are fewer.
    n_concurrent_trials: 300

    log_level: INFO

    enable_reward_shaping: false

    # RLOO-N error classification
    enable_error_classification: true
    mask_exceptions:
      - DaytonaError
      - EnvironmentStartTimeoutError
      - NetworkError
      - ConnectionError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - AgentEnvironmentTimeoutError
    default_error_treatment: zero
    passthrough_exceptions:
      - AgentTimeoutError
      - ContextLengthExceededError

  # Model info for Harbor's hosted_vllm validation. Sized for 80B at 32k ctx.
  model_info:
    max_input_tokens: 32767
    max_output_tokens: 4096

  archiving:
    enabled: false

  trace_upload:
    enabled: true
    repo_org: DCAgent
    episodes: last
    dataset_type: SFT

# Trainer configuration
trainer:
  strategy: fsdp2
  # 80B fits the node budget only with gradient checkpointing (Stage-7 P3:
  # made replay-recompute-safe, commit 9a0ae57f).
  gradient_checkpointing: true
  gradient_checkpointing_use_reentrant: false

  algorithm:
    advantage_estimator: rloo_n
    use_kl_loss: false
    kl_loss_coef: 0.0
    eps_clip_low: 0.2
    eps_clip_high: 0.05
    loss_reduction: token_mean

  epochs: 2
  max_steps: 80
  update_epochs_per_batch: 1

  train_batch_size: 64
  policy_mini_batch_size: 64
  eval_batch_size: 64

  # Micro batch sizes (micro1x4 variant — match a3)
  micro_forward_batch_size_per_gpu: 4
  micro_train_batch_size_per_gpu: 1

  max_prompt_length: 999999

  eval_interval: 999999
  eval_before_train: false
  ckpt_interval: 3
  resume_mode: latest
  hf_save_interval: 5
  hf_hub_repo_id: null
  hf_hub_private: false
  hf_hub_revision: main

  enable_db_registration: false

  project_name: OpenThoughts-Agent
  log_level: INFO
  tracker_commit_each_step: true
  # 80B prod runs use console logging instead of wandb: SkyRL's tracking.py
  # hardcodes wandb.Settings(mode="shared") for multi-node system-metric
  # aggregation, and shared mode IGNORES WANDB_MODE=offline — it requires a
  # live wandb server and wandb.init() times out after 90s through the
  # compute node's proxychains (CommError). This is what killed attempts
  # 599463 and 600913 (model/training were fine, telemetry init was not).
  # logger=console disables the wandb.init path entirely while ConsoleLogger
  # + the trainer's WANDB_MIRROR stdout lines still emit every per-step
  # metric to the .out. This is a per-run override; flag-off (a3) runs that
  # don't set logger stay on wandb and are byte-identical.
  logger: console

  run_name: null
  ckpt_path: null
  export_path: null

  policy:
    model:
      path: Qwen/Qwen3-Next-80B-A3B-Instruct
    optimizer_config:
      lr: 8e-6
      weight_decay: 0.0
      adam_betas: [0.9, 0.999]
      max_grad_norm: 0.9
    fsdp_config:
      cpu_offload: true
      reshard_after_forward: true
      fsdp_size: 4
      # --- Expert-parallel / router-replay (80B swaps) ---
      expert_model_parallel_size: 8
      moe_router_replay: true
      moe_grouped_gemm: true
      ep_comm_backend: torch
  ref:
    model:
      path: Qwen/Qwen3-Next-80B-A3B-Instruct
    fsdp_config:
      cpu_offload: true
      reshard_after_forward: true
      fsdp_size: 4
      expert_model_parallel_size: 8
      moe_router_replay: true
      moe_grouped_gemm: true
      ep_comm_backend: torch

  # Model placement — DISAGGREGATED (non-colocated): training on 8 dedicated
  # nodes (EP=8 x FSDP=4 = 32 GPUs); inference engines on separate nodes.
  # This is the key difference from the Stage-7 capstone (colocated -> OOM in
  # the weight-sync gather). Non-colocated should fit; if it still OOMs, that
  # is the streamed-gather fix flagged in stage7_scope.md.
  placement:
    colocate_all: false
    policy_num_nodes: 8
    ref_num_nodes: 8
    policy_num_gpus_per_node: 4
    ref_num_gpus_per_node: 4

  fully_async:
    max_staleness_steps: 16
    # Workers that pump Harbor trials into SkyRL. Scaled to the engine fleet:
    # ~16 engines x ~48 in-flight ~= 768. Matches n_concurrent_trials headroom.
    num_parallel_generation_workers: 768

# Generator configuration — DISAGGREGATED inference fleet
generator:
  backend: vllm
  timeout_multiplier: 1.0
  model_dtype: bfloat16

  # Each engine is multi-GPU: Qwen3-Next-80B (3B-active MoE) serves on TP=4
  # (one full GH200 node per engine). Confirmed fittable per the capstone.
  inference_engine_tensor_parallel_size: 4
  # START 16 engines x TP=4 = 64 GPUs / 16 nodes. With 32 train GPUs = 24 nodes.
  # CALIBRATE up toward the a3 6:1 inf:train ratio (up to ~40 engines) if the
  # trainer is gen-bound; down if gen is a surplus. Stay within ~71 free reformo
  # nodes (never preempt a3).
  num_inference_engines: 16

  n_samples_per_prompt: 8
  eval_n_samples_per_prompt: 8

  gpu_memory_utilization: 0.85

  max_num_seqs: 24
  max_num_batched_tokens: 16384

  enable_prefix_caching: true
  enable_chunked_prefill: true

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true
  enable_ray_prometheus_stats: false
  vllm_stats_interval: 1
  append_eos_token_after_stop_str_in_multi_turn: true
  max_turns: 999999

  sampling_params:
    max_generate_length: 4096
    temperature: 0.7
    top_p: 0.95
    top_k: 20

  engine_init_kwargs:
    max_model_len: 32768
    # routed_experts capture rail requires the P1 HTTP overlay + this flag is
    # set at engine launch (enable_return_routed_experts) in the sbatch.
    custom_chat_template_chat_completion_path: chat_templates/qwen3_thinking_acc.jinja2

# Data paths
data:
  train_data: []
  val_data: []
