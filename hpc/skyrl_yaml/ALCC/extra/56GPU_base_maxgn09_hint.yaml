entrypoint: examples.terminal_bench.entrypoints.main_tbench

# 56GPU teacher-hint variant (14-node Perlmutter). Combines 56GPU_base.yaml's
# tripled inference / generation cap (16→48 engines, 300→900 trials,
# 768→2304 workers) with the teacher_hint PRM from the deprecated
# 24GPU_base_maxgn09_hint.yaml.
#
# v2 ablation knobs vs the May-24 maxgn09_hint job 53336325:
#   - check_interval lowered 8 → 4 so more rollouts (especially the 62%
#     that ended in <8 turns) actually get a hint. Per teacher_hint_v2
#     analysis: hint mechanism only touches ~35% of rollout budget at
#     interval=8; halving the interval should roughly double exposure.
#   - max_grad_norm 0.9 retained (no collapse observed in v1).
#
# All else mirrors ALCC/56GPU_base.yaml — same 56 GPU / 14 node layout.

config_groups:
  terminal_bench_config: terminal_bench

terminal_bench:
  trials_dir: null

  harbor:
    name: terminus-2
    max_episodes: 999999
    enable_summarize: false
    store_all_messages: true
    enable_episode_logging: false
    record_terminal_session: false
    enable_pane_logging: false

    strict_json_parser: true

    interleaved_thinking: true
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
    override_timeout_sec: 1800

    override_cpus: 1
    override_memory_mb: 2048
    override_storage_mb: 2048

    auto_snapshot: true

    verifier_override_timeout_sec: 120

    max_retries: 3
    min_wait_sec: 60.0
    max_wait_sec: 600.0
    wait_multiplier: 2.0

    exclude_exceptions:
      - VerifierTimeoutError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - VerifierOutputParseError
      - VerifierRuntimeError

    prm:
      name: teacher_hint
      engine_type: openai
      engine_kwargs:
        model: gpt-5.5-2026-04-23
        # max_tokens 2048: paired with the teacher_hint PRM's 2048-token
        # hard mandate in its system prompt (preserves the May-21 fix
        # that resolved the ContextLengthExceeded collapse on job 53102590).
        max_tokens: 2048
      # v2 ablation: 8 → 4. Per teacher_hint_v2 analysis, 62% of rollouts
      # finish in <8 turns and never received a hint at interval=8.
      # Halving exposes ~2x more rollouts to hints. Recommended next-move
      # #2 in REPORT_v2.md.
      check_interval: 4
      min_turns: 4
      k: 8

    # v3 (2026-05-25): walked back concurrency 900 → 500. Three v2 chain
    # links (53383710/12/13) died with the Ray-2.48 distributed-refcount
    # SIGABRT after monotonically-growing volumes of
    # `reference_count.cc:1619: ref already removed` warnings (133→431→838).
    # Root cause: single skyrl_entrypoint driver hits a Ray-internal
    # threshold under extreme actor/object-ref concurrency. v1 (300 trials)
    # ran 23h clean; 500 keeps 1.67x v1 headroom while staying clear of
    # the empirically-bad ceiling. check_interval=4 retained — that is
    # the actual ablation knob.
    n_concurrent_trials: 500

    log_level: INFO

    enable_reward_shaping: false

    enable_error_classification: true
    mask_exceptions:
      - DaytonaError
      - EnvironmentStartTimeoutError
      - NetworkError
      - ConnectionError
      - RewardFileNotFoundError
      - RewardFileEmptyError
      - AgentEnvironmentTimeoutError
    default_error_treatment: zero
    passthrough_exceptions:
      - AgentTimeoutError
      - ContextLengthExceededError

  model_info:
    max_input_tokens: 32767
    max_output_tokens: 4096

  archiving:
    enabled: false

  trace_upload:
    enabled: true
    repo_org: DCAgent
    episodes: last
    dataset_type: SFT

trainer:
  strategy: fsdp2
  algorithm:
    advantage_estimator: rloo_n
    use_kl_loss: false
    kl_loss_coef: 0.0
    eps_clip_low: 0.2
    eps_clip_high: 0.05
    loss_reduction: token_mean

  epochs: 2
  max_steps: 80
  update_epochs_per_batch: 1

  train_batch_size: 64
  policy_mini_batch_size: 64
  eval_batch_size: 64

  micro_forward_batch_size_per_gpu: 4
  micro_train_batch_size_per_gpu: 1

  max_prompt_length: 999999

  eval_interval: 999999
  eval_before_train: false
  ckpt_interval: 3
  resume_mode: latest
  hf_save_interval: 5
  hf_hub_repo_id: null
  hf_hub_private: false
  hf_hub_revision: main

  enable_db_registration: false

  project_name: OpenThoughts-Agent
  log_level: INFO
  tracker_commit_each_step: true

  run_name: null
  ckpt_path: null
  export_path: null

  policy:
    optimizer_config:
      lr: 8e-6
      weight_decay: 0.0
      adam_betas: [0.9, 0.999]
      max_grad_norm: 0.9
    fsdp_config:
      cpu_offload: true
      reshard_after_forward: true
      fsdp_size: 4
  ref:
    fsdp_config:
      cpu_offload: true
      reshard_after_forward: true
      fsdp_size: 4

  placement:
    colocate_all: false
    policy_num_nodes: 2
    ref_num_nodes: 2
    policy_num_gpus_per_node: 4
    ref_num_gpus_per_node: 4

  fully_async:
    max_staleness_steps: 16
    # v3 (2026-05-25): walked back 2304 → 1500 alongside n_concurrent_trials
    # 900 → 500 to avoid the Ray-2.48 ref-counting SIGABRT. 1500 is ~2x v1's
    # 768. Keeps inference-engine pressure low while staying clear of the
    # driver-side concurrency ceiling.
    num_parallel_generation_workers: 1500

generator:
  backend: vllm
  timeout_multiplier: 1.0
  model_dtype: bfloat16

  inference_engine_tensor_parallel_size: 1
  # 14-node layout: 48 inference engines + 8 GPUs policy/ref = 56 GPUs.
  num_inference_engines: 48

  n_samples_per_prompt: 8
  eval_n_samples_per_prompt: 8

  gpu_memory_utilization: 0.85

  max_num_seqs: 24
  max_num_batched_tokens: 16384

  enable_prefix_caching: true
  enable_chunked_prefill: true

  run_engines_locally: true
  weight_sync_backend: nccl
  async_engine: true
  batched: false
  enable_http_endpoint: true
  enable_ray_prometheus_stats: false
  vllm_stats_interval: 1
  append_eos_token_after_stop_str_in_multi_turn: true
  max_turns: 999999

  sampling_params:
    max_generate_length: 4096
    temperature: 0.7
    top_p: 0.95
    top_k: 20

  engine_init_kwargs:
    max_model_len: 32768
    custom_chat_template_chat_completion_path: chat_templates/qwen3_thinking_acc.jinja2

data:
  train_data: []
  val_data: ["open-thoughts/OpenThoughts-TB-dev"]
