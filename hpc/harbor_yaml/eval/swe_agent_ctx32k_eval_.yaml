job_name: swe-agent-eval-job
jobs_dir: trace_jobs
n_attempts: 3
timeout_multiplier: 8.0
debug: false
orchestrator:
  type: local
  n_concurrent_trials: 16
  quiet: false
  plain_output: true
  adaptive_concurrency:
    enabled: false
    algorithm: gradient2
    min_limit: null
    max_limit: null
    metrics_endpoint: null
    metrics_timeout_sec: 10.0
    poll_interval_sec: 120.0
    window_size: 5
    queue_p95_drop_threshold: null
    algorithm_kwargs: {}
  retry:
    max_retries: 10
    include_exceptions: null
    exclude_exceptions:
    - AgentTimeoutError
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
    - SandboxBuildFailedError
    - VerifierRuntimeError
    - SummarizationTimeoutError
    - ContextLengthExceededError
    wait_multiplier: 2.0
    min_wait_sec: 1.0
    max_wait_sec: 90.0
  kwargs: {}
environment:
  type: daytona
  force_build: true
  delete: true
  override_cpus: 2
  override_memory_mb: 4096
  override_storage_mb: 4096
  kwargs:
    auto_snapshot: true
verifier:
  override_timeout_sec: 1800
  max_timeout_sec: 900
  disable: false
agents:
- name: swe-agent
  import_path: null
  model_name: hosted_vllm/placeholder-override-at-runtime
  max_timeout_sec: null
  kwargs:
    model_info:
      max_input_tokens: 32768
      max_output_tokens: 8192
      input_cost_per_token: 0
      output_cost_per_token: 0
datasets:
- path: /replace/with/tasks/path
tasks: []
