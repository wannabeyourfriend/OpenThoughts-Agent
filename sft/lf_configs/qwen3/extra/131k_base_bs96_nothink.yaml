### HPC Launch Settings
global_batch_size: 96
per_device_train_batch_size: 1

### model
model_name_or_path: Qwen/Qwen3-8B
trust_remote_code: true
attn: fa3
enable_liger_kernel: true
optim: adamw_torch_fused
# YaRN rope scaling: extends 32k native context to 131k
# Using explicit dict to match official Qwen3 recommendation (factor=4.0, orig=32768)
# https://huggingface.co/Qwen/Qwen3-8B#processing-long-texts
rope_scaling:
  rope_type: yarn
  factor: 4.0
  original_max_position_embeddings: 32768

### sequence parallelism (DeepSpeed ALST / Ulysses)
# Qwen3-8B has 32 attention heads; SP size must divide num_attention_heads
# SP=4: each GPU handles 131072/4 = 32768 tokens, same per-GPU load as 32k config
# Valid SP sizes for 32 heads: 1, 2, 4, 8, 16, 32
sequence_parallel_size: 4
sequence_parallel_mode: deepspeed-alst
alst_sequence_backend: deepspeed
alst_ulysses_degree: 4
alst_sequence_tiling: true
alst_memory_optimizations: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: sft/lf_configs/deepspeed/ds_z3_alst.json
include_mfu: true

### dataset
template: qwen3_nothink
cutoff_len: 131072
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_persistent_workers: true
dataloader_pin_memory: true
dataloader_num_workers: 4
pad_to_multiple_of: auto

### output
logging_steps: 5
save_strategy: "steps"
save_steps: 300
save_total_limit: 1
load_best_model_at_end: false
logging_strategy: "steps"
plot_loss: true

### train
learning_rate: 4.0e-5
num_train_epochs: 7.0
max_grad_norm: 1.0e-4
adam_beta2: 0.98
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
pure_bf16: false
gradient_checkpointing: true
ddp_timeout: 180000000
push_to_hub: true
