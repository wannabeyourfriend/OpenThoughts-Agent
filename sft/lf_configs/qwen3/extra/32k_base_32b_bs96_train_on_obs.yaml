### HPC Launch Settings
global_batch_size: 96
# gradient_accumulation_steps = global_batch_size // (num_nodes * gpus_per_node)

### model
model_name_or_path: Qwen/Qwen3-32B
trust_remote_code: true
attn: fa3
enable_liger_kernel: true
optim: adamw_torch_fused

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: sft/llamafactory/examples/deepspeed/ds_z3_offload_nomat_config.json
include_mfu: true

### dataset
template: qwen3
cutoff_len: 32768
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_persistent_workers: true
dataloader_pin_memory: true
dataloader_num_workers: 4
# Train on assistant turns AND observation/tool-output turns (and the user/system
# prompts — see CLAUDE.md "How loss masking works in LF"). Use this variant when
# you want the model to learn the agent's interaction patterns *and* the tool
# I/O distribution. For assistant-only loss (the default), use the sibling
# 32k_base_32b_bs96.yaml which omits this flag.
train_on_prompt: true

### output
logging_steps: 5
save_strategy: "steps"
save_steps: 100
save_total_limit: 1
load_best_model_at_end: false
logging_strategy: "steps"   # keep as you like
plot_loss: true

### train
learning_rate: 4.0e-5
num_train_epochs: 7.0
max_grad_norm: 1.0e-4
# adam_beta1: 0.97
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
pure_bf16: false
gradient_checkpointing: true
ddp_timeout: 180000000
